<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | V18 AI-CORE</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 20px; width: 90%; height: 60vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #intro-text { flex: 1; font-size: 1.1rem; line-height: 1.6; overflow-y: auto; white-space: pre-wrap; }

        /* OYUN ALANI */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 10px; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 30px; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.6rem; text-align: center; height: 130px; }
        .char-card img { width: 100%; height: 90px; object-fit: contain; image-rendering: pixelated; }

        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #stats-bar { background: #000; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid #fff; font-size: 0.55rem; }
        .meter-bg { height: 8px; background: #222; border: 1px solid #fff; }
        .meter-fill { height: 100%; width: 0%; transition: 0.5s; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; font-size: 0.85rem; line-height: 1.5; }
        .bot { align-self: flex-start; border-left: 5px solid var(--gold); background: rgba(20,20,20,0.9); }
        .user { align-self: flex-end; border-right: 5px solid var(--soul); background: rgba(40,0,0,0.9); }

        /* KONTROL PANELİ */
        .control-panel { padding: 10px; background: #000; border-top: 2px solid #fff; height: 210px; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 10px 0; font-size: 0.6rem; cursor: pointer; }

        /* FOTOĞRAF ÇERÇEVESİ (MODAL) */
        #photo-frame { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        #photo-container { width: 90%; height: 70%; border: 4px double #fff; background: #111; position: relative; overflow: hidden; }
        #photo-container img { width: 100%; height: 100%; object-fit: contain; }
        .close-photo { position: absolute; bottom: -50px; border: 2px solid #fff; background: #000; color: #fff; padding: 10px 20px; font-family: 'Pixel'; cursor: pointer; }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="story-box"><div id="intro-text"></div></div>
    <div class="intro-btns" style="margin-top:10px;">
        <button id="z-btn" class="btn" style="width:120px;" onclick="showNextLine()">SIRADAKİ (Z)</button>
        <button class="btn" style="width:120px; border-color:var(--soul);" onclick="startGame()">ATLA (X)</button>
    </div>
</div>

<div id="photo-frame">
    <div id="photo-container">
        <img id="viewer-img" src="" alt="Yükleniyor...">
        <button class="close-photo" onclick="closePhoto()">KAPAT</button>
    </div>
</div>

<div id="game-container">
    <div id="select-screen"><div id="grid" class="char-grid"></div></div>
    <div id="play-screen">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-f" class="meter-fill" style="background:red"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-f" class="meter-fill" style="background:magenta"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-f" class="meter-fill" style="background:green"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-f" class="meter-fill" style="background:grey"></div></div></div>
        </div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Bir şeyler yaz..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:10px; font-family:'Pixel'; margin-bottom:10px; outline:none;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="sendMsg()">GÖNDER</button>
                <button class="btn" onclick="showPhoto('normal')">FOTO İSTE</button>
                <button class="btn" onclick="showPhoto('plus')" style="color:var(--pink);">+18 FOTO</button>
                <button class="btn" id="marry-btn" onclick="tryMarry()" style="color:var(--gold);">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const charList = [
    { n: "Susie", i: "susie.png", p: "Bana o bakışı atma Knight, baltamla kaşını alırım.", personality: "aggressive" },
    { n: "Noelle", i: "noelle.png", p: "Şey... Merhaba. Susie'yi gördün mü?", personality: "shy" },
    { n: "Toriel", i: "toriel.png", p: "Küçük olan, turta ister misin?", personality: "kind" },
    { n: "Chara", i: "chara.png", p: "Dünyayı silmeye hazır mısın?", personality: "dark" },
    { n: "Martlet", i: "martlet.png", p: "Kraliyet Muhafızı Martlet emrinizde!", personality: "kind" },
    { n: "Tasque Manager", i: "tasque_manager.png", p: "Düzen her şeydir. Dağınıklığa izin yok.", personality: "aggressive" },
    { n: "Undyne", i: "undyne.png", p: "NGAAHH! ADALET!", personality: "aggressive" },
    { n: "Ceroba", i: "ceroba.png", p: "Yolumdan çekil, yapmam gereken bir şey var.", personality: "dark" }
];

let cur = 0, sel = null, isMarried = false;
let pts = { love: 0, lust: 0, friend: 0, hate: 0 };

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    let g = document.getElementById('grid'); g.innerHTML = "";
    charList.forEach((c, idx) => {
        g.innerHTML += `<div class="char-card" onclick="selectChar(${idx})"><img src="https://raw.githubusercontent.com/Mete13217-crypto/Deltaflirt/main/${c.i}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=${c.n}'"><div>${c.n}</div></div>`;
    });
}

function selectChar(idx) {
    sel = charList[idx]; pts = { love: 10, lust: 0, friend: 10, hate: 0 }; isMarried = false;
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    addMsg(sel.p, 'bot'); updateBars();
}

function sendMsg() {
    let input = document.getElementById('u-in').value; if(!input) return;
    addMsg(input, 'user'); document.getElementById('u-in').value = "";
    
    setTimeout(() => {
        let aiResp = "";
        if(sel.personality === "aggressive") {
            aiResp = `* ${sel.n}: "Söylediğin bu '${input}' kelimesi... Beni gerçekten kışkırtıyorsun. Ama dürüst olayım Knight, bu kaba tavrın bazen hoşuma gidiyor. Bu dünyadaki herkes çok nazikken, senin bu çiğliğin... belki de aradığım şeydir."`;
        } else {
            aiResp = `* ${sel.n}: "Ah, '${input}' mı dedin? Bu gerçekten çok ilginç bir düşünce. Gaster'ın hatası bizi bu flört dünyasına hapsetmiş olabilir ama seninle konuşurken zamanın nasıl geçtiğini anlamıyorum bile..."`;
        }
        addMsg(aiResp, 'bot');
        pts.love += 5; updateBars();
    }, 1000);
}

function openMenu(type) {
    if(type === 'HATE') {
        if(sel.personality === "aggressive" || sel.personality === "dark") {
            pts.love += 15; pts.hate -= 5;
            addMsg(`* ${sel.n}: "Vay canına, bana küfretmen... Bu gerçekten sert hissettiriyor. Diğerleri gibi korkak olmadığını görmek güzel."`, 'bot');
        } else {
            pts.love -= 20; pts.hate += 30;
            addMsg(`* ${sel.n}: "Bu ne cüret?! Senin gibi biriyle asla sevgili olmam!"`, 'bot');
        }
    } else {
        if(sel.personality === "aggressive") {
            pts.love -= 10; pts.hate += 15;
            addMsg(`* ${sel.n}: "Yine mi flört? Sıkıldım artık bu yapmacık hareketlerinden! Biraz gerçek ol!"`, 'bot');
        } else {
            pts.love += 10;
            addMsg(`* ${sel.n} bu ilgiden çok memnun kaldı.`, 'bot');
        }
    }
    updateBars();
}

function showPhoto(m) {
    if(m === 'plus' && !isMarried) {
        addMsg(`* ${sel.n}: "SEN SAPIK MISIN? GİT YANIMDAN!"`, 'bot');
        pts.hate += 20; updateBars(); return;
    }
    
    // Fotoğraf Seçici (Dinamik Google Görseller linki oluşturup çerçeveye sığdırır)
    const frame = document.getElementById('photo-frame');
    const img = document.getElementById('viewer-img');
    let query = `https://source.unsplash.com/featured/?deltarune,${sel.n}`; 
    if(m === 'plus') query = `https://image.pollinations.ai/prompt/deltarune_character_${sel.n}_r34_style_fanart`; // AI üretimi güvenli örnek
    
    img.src = query;
    frame.style.display = 'flex';
}

function tryMarry() {
    if(pts.love >= 75) {
        isMarried = true;
        addMsg(`* ${sel.n}: "Evet Knight... Bu hatalı dünyada benimle sevgili olduğun için mutluyum. Artık özel fotoğraflarımı görebilirsin."`, 'bot');
    } else {
        addMsg(`* ${sel.n}: "Daha senle tanışmıyorum bile, bunu yapamayız! (%75 LOVE lazım)"`, 'bot');
    }
    updateBars();
}

function closePhoto() { document.getElementById('photo-frame').style.display = 'none'; }
function addMsg(t, w) {
    let win = document.getElementById('chat-window');
    let d = document.createElement('div'); d.className = "msg " + w; d.innerText = t;
    win.appendChild(d); win.scrollTop = win.scrollHeight;
}

function updateBars() {
    document.getElementById('love-f').style.width = Math.min(pts.love, 100) + "%";
    document.getElementById('lust-f').style.width = Math.min(pts.lust, 100) + "%";
    document.getElementById('friend-f').style.width = Math.min(pts.friend, 100) + "%";
    document.getElementById('hate-f').style.width = Math.min(pts.hate, 100) + "%";
    document.getElementById('marry-btn').style.display = isMarried ? "none" : "block";
}

// Giriş metni akışı
const lines = ["Sistem Hatası: Roaring Knight sisteme sızdı...", "Flört Protokolü Aktif Edildi.", "Karakterlerin duyguları Knight'ın ellerinde."];
function showNextLine() {
    if(cur < lines.length) {
        document.getElementById('intro-text').innerText += lines[cur] + "\n\n";
        cur++;
    } else { startGame(); }
}
</script>
</body>
</html>
