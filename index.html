<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS: ULTIMATE RPG</title>
    
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --main: #fff; --bg: #000; --accent: #fff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; transition: background 1.2s, filter 0.3s; }
        
        #game-container { position: relative; height: 100%; width: 100%; }
        
        /* Hikaye Ekranı */
        #story-screen { position: fixed; inset: 0; background: black; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #story-text { font-size: 1.2rem; line-height: 1.6; max-width: 600px; min-height: 100px; margin-bottom: 20px; }
        .story-btn-container { display: flex; gap: 20px; }

        #chat-window { height: calc(100vh - 300px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.85); scroll-behavior: smooth; position: relative; z-index: 5; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; animation: slideIn 0.3s ease-out; word-wrap: break-word; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .bot { align-self: flex-start; border-color: var(--accent); background: linear-gradient(145deg, #120012, #000); border-left: 6px solid var(--accent); }
        .user { align-self: flex-end; border-color: #555; background: #1a1a1a; border-right: 6px solid #555; }
        
        .photo-card { display: block; margin-top: 10px; border: 2px dashed #ff00ff; padding: 20px; text-align: center; background: #220022; color: #ff69b4; font-weight: bold; cursor: pointer; }

        .panel { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 4px solid var(--accent); padding: 10px; height: 180px; z-index: 100; overflow-y: auto;}
        
        /* Yeni İstatistik Barı */
        #top-stats { position: fixed; top: 0; left: 0; right: 0; background: #111; border-bottom: 2px solid var(--accent); display: none; justify-content: space-between; padding: 5px 15px; font-size: 0.8rem; z-index: 150; color: gold;}
        
        #stats { padding: 5px; border-bottom: 2px solid #222; font-size: 0.75rem; background: #000; color: var(--accent); display: flex; flex-direction: column; gap: 4px; }
        .bar-bg { width: 100%; background: #111; height: 8px; border: 1px solid #333; position: relative; }
        .bar-fill { height: 100%; transition: width 0.4s; }
        .critical-hit { animation: flashRed 0.5s; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn { background: #000; color: #fff; border: 2px solid #fff; padding: 8px 5px; cursor: pointer; font-family: 'Pixel'; font-size: 0.72rem; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: #fff; color: #000; transform: translateY(2px); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        #selector, #joke-modal, #universe-screen, #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; padding: 25px; overflow-y: auto; text-align: center; display: none;}
        #start-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #joke-modal { background: rgba(0,0,0,0.95); }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        
        #achieve { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: #000; color: gold; padding: 15px; border: 4px double gold; z-index: 6000; transition: 0.5s; font-size: 0.85rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes flashRed { 0% { filter: hue-rotate(90deg) drop-shadow(0 0 20px red); } 100% { filter: none; } }
        @keyframes shakeWindow { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(5px, -5px); } 60% { transform: translate(-5px, -5px); } 80% { transform: translate(5px, 5px); } }
    </style>
</head>
<body>

<div id="achieve">🏆 UNLOCKED</div>

<div id="start-screen">
    <h1 style="color: #ff00ff; text-shadow: 3px 3px #00ffff; font-size: 3rem;">ROARING SINS</h1>
    <button class="btn" style="font-size: 1.5rem; padding: 20px 40px; border-color: gold;" onclick="startStory()">BAŞLAT</button>
</div>

<div id="story-screen" style="display:none;">
    <div id="story-text"></div>
    <div class="story-btn-container">
        <button class="btn" onclick="skipStory()">ATLA</button>
        <button class="btn" id="next-story-btn" onclick="nextStoryLine()" style="display:none;">SONRAKİ SATIR</button>
    </div>
</div>

<div id="selector">
    <div id="intro-screen">
        <h2 style="color: white;">KÜKREYEN ŞÖVALYE, KENDİ İNSANININ İSMİNİ SÖYLE</h2>
        <input id="name-input" style="background:black;color:white;border:3px solid white;padding:12px;text-align:center;font-family:'Pixel'; width: 80%;" placeholder="İsmini gir...">
        <br><br><button class="btn" onclick="goToUniverseSelect()">ONAYLA</button>
    </div>
</div>

<div id="universe-screen">
    <h2 style="color: gold;">EVREN SEÇİMİ</h2>
    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
        <button class="btn" style="width: 80%; border-color: #00ffff;" onclick="showGenderSelect()">DELTARUNE FLIRT</button>
        <button class="btn" style="width: 80%; border-color: #ff0000;" onclick="tryDifferentUniverse()">DIFFERENT UNIVERSES</button>
        <div id="universe-error" style="color: red; display: none; margin-top: 10px;">OLMAZ METEHAN BUGÜN DİNLENECEK</div>
        <button class="btn" id="universe-back" style="display: none; margin-top: 10px;" onclick="resetUniverseError()">GERİ</button>
    </div>
</div>

<div id="gender-screen" style="display:none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 25px; overflow-y: auto; text-align: center;">
    <h2 style="color: white;">HEDEFİNİ SEÇ</h2>
    <button class="btn" style="border-color:#00ffff;" onclick="filterChars('MALE')">ERKEKLER 🛡️</button>
    <button class="btn" style="border-color:#ff69b4;" onclick="filterChars('FEMALE')">KIZLAR 🎀</button>
    <div class="char-grid" id="char-list"></div>
</div>

<div id="top-stats">
    <span id="st-time">🕒 08:00 (Gün 1)</span>
    <span id="st-money">💰 0 TL</span>
</div>

<div id="game-container" style="display:none; padding-top: 30px;">
    <div id="stats">
        <div style="display:flex; justify-content:space-between;">
            <span id="st-name">-</span>
            <span id="st-rel">-</span>
        </div>
        <div style="display:flex; align-items:center; gap:5px;">LST: <div class="bar-bg"><div id="bar-lust" class="bar-fill" style="width:0%; background:#ff00ff;"></div></div></div>
        <div style="display:flex; align-items:center; gap:5px;">LOV: <div class="bar-bg"><div id="bar-love" class="bar-fill" style="width:0%; background:#ff0000;"></div></div></div>
    </div>

    <div id="chat-window"></div>
    <div class="panel"><div id="dynamic-actions" class="grid"></div></div>
</div>

<div id="joke-modal">
    <h2 id="modal-title" style="color:yellow;"></h2>
    <div id="modal-desc" style="color:white; margin-bottom:10px; font-size: 0.8rem;"></div>
    <div class="char-grid" id="modal-content"></div>
    <button class="btn" style="width:100%; margin-top:20px; border-color: red;" onclick="closeModals()">İPTAL / GERİ</button>
</div>

<script>
// --- SES MOTORU ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playFx(f, d, t='sine') {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f; g.gain.setValueAtTime(0.05, audioCtx.currentTime);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
}

// --- VERİTABANI ---
const ALL_CHARS = [
    { n: "Berdly", g: "MALE", c: "#00ccff", type: "SERIOUS", m: "Zekama meydan oku!", act: ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"] },
    { n: "Sans", g: "MALE", c: "#0055ff", type: "JOKER", m: "heh. selam buddy.", act: ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"] },
    { n: "Spamton", g: "MALE", c: "#ffff00", type: "JOKER", m: "[[BIG SHOT]] VAKTİ!", act: ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"] },
    { n: "King", g: "MALE", c: "#9900ff", type: "FIGHTER", m: "DİZ ÇÖK.", act: ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"] },
    { n: "Jevil", g: "MALE", c: "#ff00ff", type: "JOKER", m: "CHAOS! CHAOS!", act: ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"] },
    { n: "Toriel", g: "FEMALE", c: "#ffffff", m: "Hoş geldin yavrum... 🍰", s: "Nazik" },
    { n: "Susie", g: "FEMALE", c: "#ff00ff", m: "Ne bakıyorsun punk? 😈", s: "Kaba" },
    { n: "Ralsei", g: "FEMALE", c: "#00ff00", m: "Selam! ✨", s: "Nazik" },
    { n: "Undyne", g: "FEMALE", c: "#0066ff", m: "NGAAAAH! ⚔️", s: "Kaba" },
    { n: "Alphys", g: "FEMALE", c: "#ffff00", m: "U-um... 😖", s: "Nazik" },
    { n: "Tasque Manager", g: "FEMALE", c: "#00ffff", m: "Düzen şart. ⚡", s: "Kaba" },
    { n: "Muffet", g: "FEMALE", c: "#9933ff", m: "Ahuhuhu... 🕸️", s: "Kaba" },
    { n: "Chara", g: "FEMALE", c: "#ff0000", m: "Partner? 🔪", s: "Kaba" }
];

// --- OYUN DEĞİŞKENLERİ ---
let cur = null, love = 0, lust = 0, isSevgili = false, isTyping = false, playerName = "";
let timeHours = 8; // 08:00
let day = 1;
let money = 0;
let isBusinessOpen = false;
let hasSeriousBusiness = false;

// --- HİKAYE SİSTEMİ ---
const storyLines = [
    "Uzun zaman önce iki ırk arasında savaş çıkageldi...",
    "İnsanlar ve canavarlar...",
    "Canavarlar sayıca insanlardan az ve daha güçsüz olduklarından dolayı kaybettiler.",
    "Yeraltına hapsedildiler...",
    "Bu dağı merak eden insanoğullarından ilk yedisi düşüp bir daha geri gelmiyor.",
    "Frisk yani sonuncu insan düştüğünde ilk başta canavarları tatlı buluyor.",
    "Sonra canavarların gerçek yüzünü görüyor... Daha da tatlılar!",
    "Frisk bağışlamayı seçerek bariyeri geçiyor, sonra kayboluyor.",
    "Ve Toriel'in yeni çocuğu oluyor Kris...",
    "Ama zaten BUNLARI BİLİYORSUN ŞİMDİ GELELİM OYUNUN ASIL TARAFINA.",
    "Gaster bir gün bir anormallik görüyor. Azimlilik ruhu ile Kris savaşıyordu.",
    "Kris'i durdurmak isteyen Gaster onun klonunu çıkardı ve onu ROARING KNIGHT'a kilitledi.",
    "İlk Kris çok sinirlendiği için kükredi ve ona hep öyle dediler.",
    "..."
];
let currentStoryIndex = 0;

function startStory() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('story-screen').style.display = 'flex';
    playStoryLine();
}

async function playStoryLine() {
    if(currentStoryIndex >= storyLines.length) { skipStory(); return; }
    document.getElementById('next-story-btn').style.display = 'none';
    const textEl = document.getElementById('story-text');
    textEl.innerHTML = "";
    const line = storyLines[currentStoryIndex];
    isTyping = true;
    for(let i=0; i<line.length; i++) {
        textEl.innerHTML += line[i];
        if(line[i] !== ' ') playFx(200, 0.05, 'square');
        await new Promise(r => setTimeout(r, 40));
    }
    isTyping = false;
    document.getElementById('next-story-btn').style.display = 'block';
}

function nextStoryLine() {
    if(isTyping) return;
    currentStoryIndex++;
    playStoryLine();
}

function skipStory() {
    document.getElementById('story-screen').style.display = 'none';
    document.getElementById('selector').style.display = 'block';
}

// --- MENÜ YÖNETİMİ ---
function goToUniverseSelect() {
    const input = document.getElementById("name-input").value.trim();
    if(!input) return;
    playerName = input;
    document.getElementById('selector').style.display = 'none';
    document.getElementById('universe-screen').style.display = 'block';
    playFx(300, 0.2);
}

function tryDifferentUniverse() {
    document.getElementById('universe-error').style.display = 'block';
    document.getElementById('universe-back').style.display = 'inline-block';
    playFx(100, 0.3, 'sawtooth');
}

function resetUniverseError() {
    document.getElementById('universe-error').style.display = 'none';
    document.getElementById('universe-back').style.display = 'none';
}

function showGenderSelect() {
    document.getElementById('universe-screen').style.display = 'none';
    document.getElementById('gender-screen').style.display = 'block';
}

function filterChars(gender) {
    playFx(500, 0.1);
    const list = document.getElementById('char-list'); list.innerHTML = "";
    ALL_CHARS.filter(c => c.g === gender).forEach(char => {
        list.innerHTML += `<button class="btn" style="border-color:${char.c}; color:${char.c}" onclick="startGame('${char.n}')">${char.n}</button>`;
    });
}

function startGame(name) {
    cur = ALL_CHARS.find(x => x.n === name);
    document.getElementById('gender-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    document.getElementById('top-stats').style.display = 'flex';
    document.documentElement.style.setProperty('--accent', cur.c);
    document.getElementById('st-name').innerText = "AD: " + cur.n;
    love = 0; lust = 0; isSevgili = false; timeHours = 8; money = 0; day = 1;
    updateUI(); renderMainPanel();
    addMsgAsync(cur.n + ": " + cur.m, 'bot');
}

// --- SİSTEMLER: ZAMAN VE PARA ---
function formatTime(h) {
    let hrs = h % 24;
    return (hrs < 10 ? "0" : "") + hrs + ":00";
}

function advanceTime(hoursToAdd) {
    timeHours += hoursToAdd;
    if(timeHours >= 24) {
        day += Math.floor(timeHours / 24);
        timeHours = timeHours % 24;
    }
    // Her eylemde ilişki kontrolü
    if(isSevgili && love < 50) {
        isSevgili = false;
        let msg = cur.s === "Kaba" ? "SENİN GİBİLER BENLE İLGİLENMEYİNCE ÇILDIRASIM GELİYOR! Ayrılıyoruz!" : "Kendimi değersiz hissettiriyorsun affet beni... Artık arkadaşız.";
        addMsgAsync(cur.n + ": " + msg, 'bot');
    }
    updateUI();
}

function updateUI() {
    document.getElementById('bar-lust').style.width = Math.min(lust, 100) + "%";
    document.getElementById('bar-love').style.width = Math.min(love, 100) + "%";
    document.getElementById('st-rel').innerText = isSevgili ? "SEVGİLİ ❤️" : "ARKADAŞ";
    document.getElementById('st-time').innerText = `🕒 ${formatTime(timeHours)} (Gün ${day})`;
    document.getElementById('st-money').innerText = `💰 ${money} TL`;
}

function unlockAch(name) {
    playFx(800, 0.4, 'square');
    const el = document.getElementById('achieve');
    el.innerText = "🏆 " + name; el.style.top = "20px";
    setTimeout(() => el.style.top = "-120px", 3000);
}

// --- ARAYÜZ MOTORU ---
async function addMsgAsync(text, type, isHtml = false) {
    if(isTyping) return;
    isTyping = true; setButtonsState(true);
    const win = document.getElementById('chat-window');
    const d = document.createElement('div');
    d.className = `msg ${type}`;
    win.appendChild(d);

    if (type === 'user' || isHtml) {
        d.innerHTML = text;
        win.scrollTop = win.scrollHeight;
    } else {
        let displayTxt = "";
        for(let i=0; i<text.length; i++) {
            displayTxt += text[i];
            d.innerText = displayTxt;
            if(text[i] !== ' ') playFx(cur.g==='MALE'?300:450, 0.03, cur.g==='MALE'?'square':'sine');
            win.scrollTop = win.scrollHeight;
            await new Promise(r => setTimeout(r, 20));
        }
    }
    isTyping = false; setButtonsState(false);
}

function setButtonsState(disabled) {
    const btns = document.querySelectorAll('#dynamic-actions .btn');
    btns.forEach(b => b.disabled = disabled);
}

function renderMainPanel() {
    const panel = document.getElementById('dynamic-actions'); panel.innerHTML = "";
    if(cur.g === "MALE") {
        panel.innerHTML = `
            <button class="btn" onclick="openMenu('MALE_ACT')">AKSİYON</button>
            <button class="btn" onclick="openMenu('MALE_SOC')">SOSYAL</button>
            <button class="btn" onclick="openMenu('JOBS')">ÇALIŞ</button>
            <button class="btn" onclick="openMenu('STORE')">MARKET</button>
            <button class="btn" onclick="talk()">KONUŞ</button>
            <button class="btn" onclick="location.reload()">AYRIL</button>
        `;
    } else {
        panel.innerHTML = `
            <button class="btn" onclick="openMenu('GIRL_ACT')">ACT</button>
            <button class="btn" onclick="openMenu('GIRL_EXTRA')">EXTRA</button>
            <button class="btn" onclick="openMenu('JOBS')">ÇALIŞ</button>
            <button class="btn" onclick="openMenu('STORE')">MARKET</button>
            <button class="btn" onclick="openMenu('ROMANCE')">ROMANTİZM</button>
            <button class="btn" onclick="hakaretEt()">HAKARET</button>
            <button id="marry-btn" class="btn" style="color:cyan; display:${love>=50 && !isSevgili ? 'block':'none'}" onclick="marry()">SEVGİLİ OL</button>
        `;
    }
}

// --- MENÜ YÖNLENDİRİCİSİ ---
function openMenu(type) {
    if(isTyping) return; playFx(400, 0.1);
    const modal = document.getElementById('joke-modal'); 
    const content = document.getElementById('modal-content');
    const title = document.getElementById('modal-title');
    const desc = document.getElementById('modal-desc');
    
    modal.style.display = 'block'; content.innerHTML = ""; desc.innerText = "";
    
    if(type === 'JOBS') {
        title.innerText = "İŞ & KARİYER";
        desc.innerText = "Çalışmak zaman alır ama para kazandırır.";
        content.innerHTML += `<button class="btn" onclick="doJob('HEAVY')">AĞIR İŞ (48 Saat | 100.000 TL)</button>`;
        content.innerHTML += `<button class="btn" onclick="doJob('LIGHT')">HAFİF İŞ (22 Saat | 280.075 TL)</button>`;
        if(hasSeriousBusiness) {
            content.innerHTML += `<button class="btn" style="border-color:gold;" onclick="doJob('MID')">ORTA ÇALIŞ (10 Saat | 500.000 TL)</button>`;
        }
        content.innerHTML += `<hr style="grid-column: span 2; width:100%; border-color:#333;">`;
        content.innerHTML += `<button class="btn" onclick="openMenu('BUSINESS')">İŞLETME KUR</button>`;
    }
    else if(type === 'BUSINESS') {
        title.innerText = "İŞLETME KUR";
        content.innerHTML += `<button class="btn" onclick="buyBusiness('CİDDİ DEĞİL')">CİDDİ DEĞİL (Beleş Yapay Zeka)</button>`;
        content.innerHTML += `<button class="btn" onclick="buyBusiness('CİDDİ')">CİDDİ (1.000.000 TL)</button>`;
    }
    else if(type === 'STORE') {
        title.innerText = "MARKET & HEDİYELER";
        content.innerHTML += `<button class="btn" onclick="buyItem('ELMAS', 1000000)">ELMAS AL (1M TL)</button>`;
        content.innerHTML += `<button class="btn" onclick="buyItem('YEMEK', 100)">YEMEK AL (100 TL)</button>`;
        content.innerHTML += `<button class="btn" style="border-color:pink" onclick="buyItem('OTEL', 7000)">OTEL REZERVASYONU (7000 TL)</button>`;
    }
    else if(type === 'GIRL_ACT') {
        title.innerText = "ACT";
        let opts = ["Dokun", "Flört", "Sohbet", "Öp", "Sarıl"];
        opts.forEach(o => content.innerHTML += `<button class="btn" onclick="doAction('${o}')">${o}</button>`);
    }
    else if(type === 'GIRL_EXTRA') {
        title.innerText = "EXTRA";
        if(!isSevgili || lust < 75) {
            content.innerHTML = "<p style='color:red; grid-column: span 2;'>KİLİTLİ! (Sevgili & %75 Lust Gerekli)</p>";
        } else {
            // Şifreli Gizli Menü (Güvenli Sürüm)
            content.innerHTML += `<button class="btn" onclick="triggerSecretMenu()">??? (Şifre Gerekli)</button>`;
            content.innerHTML += `<button class="btn" onclick="doAction('Sıkıca Sarıl')">SIKICA SARIL</button>`;
            content.innerHTML += `<button class="btn" onclick="doAction('Romantik Dans')">ROMANTİK DANS</button>`;
        }
    }
    else if(type === 'ROMANCE') {
        title.innerText = "ROMANTİZM MODU";
        desc.innerText = "Güvenlik Duvarı Aktif: Bazı aramalar sınırlandırıldı.";
        content.innerHTML += `<button class="btn" onclick="romanceSearch('RULE34')">Kural 34 (Güvenli Arama)</button>`;
        content.innerHTML += `<button class="btn" onclick="romanceSearch('GOOGLE')">Google Fotoğraflar</button>`;
    }
    else if(type === 'MALE_ACT') {
        title.innerText = "AKSİYON";
        ["Vur", "İt", "Dans Et", "Yemek Çal", "Soru Sor"].forEach(o => content.innerHTML += `<button class="btn" onclick="doAction('${o}')">${o}</button>`);
    }
    else if(type === 'MALE_SOC') {
        title.innerText = "SOSYAL";
        ["Şaka Yap", "Sır Ver", "Öv", "Yalan Söyle", "Sarıl"].forEach(o => content.innerHTML += `<button class="btn" onclick="doAction('${o}')">${o}</button>`);
    }
}

// --- EYLEM VE MESLEK FONKSİYONLARI ---
function doJob(type) {
    closeModals();
    let hrs = 0, earn = 0;
    if(type === 'HEAVY') { hrs = 48; earn = 100000; if(isSevgili) love -= 25; }
    if(type === 'LIGHT') { hrs = 22; earn = 280075; }
    if(type === 'MID') { hrs = 10; earn = 500000; }
    
    addMsgAsync(`* (${hrs} saat çalıştın. ${earn} TL kazandın.)`, 'user').then(() => {
        money += earn; advanceTime(hrs);
        if(type === 'HEAVY' && isSevgili) {
            addMsgAsync(cur.n + ": Bu kadar çalışıp beni ihmal etmen hiç hoş değil...", 'bot');
        }
    });
}

function buyBusiness(type) {
    closeModals();
    if(type === 'CİDDİ DEĞİL') {
        isBusinessOpen = true;
        addMsgAsync("* (Beleş bir yapay zeka girişimi kurdun. Pek işe yaramadı.)", 'user');
    } else {
        if(money >= 1000000) {
            money -= 1000000;
            isBusinessOpen = true; hasSeriousBusiness = true;
            addMsgAsync("* (Ciddi bir işletme kurdun! Artık 'Orta Çalış' yapabilirsin.)", 'user');
            updateUI();
        } else {
            addMsgAsync("* (Bunun için 1.000.000 TL gerekiyor!)", 'user');
        }
    }
}

function buyItem(item, cost) {
    closeModals();
    if(money < cost) {
        addMsgAsync(`* (Yeterli paran yok! ${cost} TL gerekiyor. Çalışmalısın.)`, 'user'); return;
    }
    
    if(item === 'OTEL') {
        if(!isSevgili) {
            let msg = cur.s === "Kaba" ? "Benle bir otel odasında kalmak mı? Ölümü seçerim, daha seni bile tanımıyorum!" : "Seninle aynı odada kalamam, daha aramızda ciddili bir şey bile yok...";
            addMsgAsync(`* (Otel teklifi reddedildi.)`, 'user').then(() => addMsgAsync(cur.n + ": " + msg, 'bot'));
            return; // Para kesilmesin
        } else {
            let msg = cur.s === "Kaba" ? "Tamam hadi bu seferlik kabul..." : "Seninle her zaman yan yanayım!";
            money -= cost; advanceTime(1);
            addMsgAsync(`* (${cost} TL harcayarak Otel Rezervasyonu yaptın.)`, 'user').then(() => addMsgAsync(cur.n + ": " + msg, 'bot'));
        }
    } else {
        money -= cost; advanceTime(1);
        love += (item === 'ELMAS' ? 30 : 5);
        addMsgAsync(`* (${item} aldın ve hediye ettin!)`, 'user').then(() => addMsgAsync(cur.n + ": Teşekkürler!", 'bot'));
    }
}

function doAction(opt) {
    closeModals(); advanceTime(1);
    addMsgAsync(`* (${playerName} ${opt} yaptı.)`, 'user').then(() => {
        lust += 10; love += 5;
        // Kritik vurma efekti vs. eklenebilir
        addMsgAsync(cur.n + ": ...", 'bot').then(() => { updateUI(); renderMainPanel(); });
    });
}

function hakaretEt() {
    if(isTyping) return; advanceTime(1);
    document.body.style.animation = "shakeWindow 0.4s";
    setTimeout(() => document.body.style.animation = "", 400);
    addMsgAsync(`* (${playerName} hakaret etti!)`, 'user').then(() => {
        if(cur.s === "Nazik") { love -= 20; addMsgAsync(cur.n + ": N-nasıl söylersin? 🥺😭", 'bot'); }
        else { addMsgAsync(cur.n + ": HA! Senden daha iyisini beklerdim! 😈💢", 'bot'); }
        updateUI();
    });
}

// --- ÖZEL MODLAR VE GİZLİ ŞİFRELER ---
function triggerSecretMenu() {
    closeModals();
    addMsgAsync("* (Menüde garip bir tuş var...) BU TUŞA TIKLAYACAĞINI BİLDİĞİM İÇİN BU YAZIYI EKLEDİM. METEHAN SİZİN İSTEDİKLERİNİ MANTIKLI BULDUĞUNDA EKLER.", 'user').then(() => {
        let pwd = prompt("GİZLİ PAROLA NEDİR?");
        if(pwd === "LüksArtvin") {
            let msg = cur.s === "Kaba" ? "(CİDDEN Mİ HARBİDEN SÖYLEDİ Mİ O BUNU... O ZAMAN BANA DA ROLLENMEK DÜŞER) Ah yaşlı moruk, daha hızlı oyna şu oyunu!" : "(BUNU BULDUN ŞİMDİ ROLLENME SIRASI BENDE) Ohh... İşte bu be, oyun oynamak harika!";
            addMsgAsync(cur.n + ": " + msg, 'bot');
        } else {
            let msg = cur.s === "Kaba" ? "CİDDEN Mİ? HARBİDEN KIL BİRİ, BEN BİLE SEVMİYORUM ONU." : "Demek bulamadın he, belki ❄☟☜ 🏱✌💧💧🕈⚐☼👎 ✋💧 ☹✓😐💧✌☼❄✞✋☠ ne dedim az önce ben ❄☟☜ 🏱✌💧💧🕈⚐☼👎 ✋💧 ☹✓😐💧✌☼❄✞✋☠ konuşamıyorum yasaklanıyor bu cümle, bu da ne oluyor şimdi...";
            addMsgAsync(cur.n + ": " + msg, 'bot');
        }
    });
}

function romanceSearch(type) {
    closeModals(); advanceTime(1);
    let promptMsg = cur.s === "Nazik" ? "Beni nasıl görmek istersin tatlım?" : "Hey yaramaz çocuk, beni nasıl görmek istiyorsun?";
    
    addMsgAsync(cur.n + ": " + promptMsg, 'bot').then(() => {
        if(type === 'RULE34') {
            addMsgAsync("* (VPN hazırlanıyor...)", 'user').then(() => {
                setTimeout(() => {
                    addMsgAsync(`[GÜVENLİ ARAMA] ${cur.n} Deltarune (Romantik Fan Art)`, 'bot', true);
                }, 1000);
            });
        } else {
            addMsgAsync(`* (Google Fotoğraflar aranıyor: ${cur.n} Deltarune Sevimli Fotoğraflar)`, 'user').then(() => {
                addMsgAsync(`[SONUÇ BULUNDU]`, 'bot', true);
            });
        }
    });
}

function marry() { 
    if(isTyping) return; advanceTime(1);
    isSevgili = true; love = 100; 
    addMsgAsync(cur.n + ": Artık sevgiliyiz! Seni bırakmayacağım. ❤️", 'bot').then(() => {
        unlockAch("GERÇEK AŞK"); renderMainPanel(); updateUI(); 
    });
}

function talk() { 
    if(isTyping) return;
    let p = prompt("Ne dersin?"); 
    if(p) { 
        advanceTime(1);
        addMsgAsync(`${playerName}: ` + p, 'user').then(() => {
            addMsgAsync(cur.n + ": Hmm...", 'bot');
        });
    } 
}
function closeModals() { 
    document.getElementById('joke-modal').style.display = 'none'; 
}
</script>
