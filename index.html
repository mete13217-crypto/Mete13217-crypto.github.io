<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | V13</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 20px; width: 90%; height: 65vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #intro-text { flex: 1; font-size: 1.1rem; line-height: 1.6; color: #fff; text-align: left; overflow-y: auto; word-wrap: break-word; white-space: pre-wrap; scrollbar-width: none; }
        .intro-btns { display: flex; gap: 10px; margin-top: 15px; }

        /* ANA OYUN KONTEYNER */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 30px; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.6rem; text-align: center; overflow: hidden; }
        .char-card img { width: 100%; height: 85px; object-fit: cover; image-rendering: pixelated; }

        /* OYUN EKRANI */
        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #stats-bar { background: #000; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid #fff; font-size: 0.55rem; }
        .meter-bg { height: 8px; background: #222; border: 1px solid #fff; position: relative; }
        .meter-fill { height: 100%; width: 0%; transition: 0.3s; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .bot { align-self: flex-start; border-left: 5px solid var(--gold); background: rgba(20,20,20,0.9); }
        .user { align-self: flex-end; border-right: 5px solid var(--soul); background: rgba(40,0,0,0.9); }

        /* KONTROL PANELİ */
        .control-panel { padding: 10px; background: #000; border-top: 2px solid #fff; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 10px 0; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; }
        .btn:active { background: #fff; color: #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="type-sound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

<div id="intro-screen">
    <div id="story-box">
        <div id="intro-text"></div>
        <div class="intro-btns">
            <button id="z-btn" class="btn" style="flex:1;" onclick="showNextLine()">SIRADAKİ (Z)</button>
            <button class="btn" style="flex:1; border-color: var(--soul);" onclick="startGame()">ATLA (X)</button>
        </div>
    </div>
</div>

<div id="modal">
    <h2 id="modal-title" style="color:var(--gold)">EYLEMLER</h2>
    <div id="modal-opts" style="display:grid; grid-template-columns:1fr; gap:10px; width:80%;"></div>
    <button class="btn" style="margin-top:20px; width:50%;" onclick="closeModal()">GERİ</button>
</div>

<div id="game-container">
    <div id="top-nav" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; background:#000;">
        <span id="player-tag" style="color:var(--soul);">ROARING KNIGHT</span>
        <button class="btn" style="padding:2px 10px;" onclick="goBack()">LOBİ</button>
    </div>

    <div id="select-screen">
        <div style="color:var(--gold); padding:10px;">TÜM KIZLAR (UT/DR/UTY):</div>
        <div id="grid" class="char-grid"></div>
    </div>

    <div id="play-screen">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-f" class="meter-fill" style="background:red"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-f" class="meter-fill" style="background:magenta"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-f" class="meter-fill" style="background:green"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-f" class="meter-fill" style="background:grey"></div></div></div>
        </div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Mesajını buraya yaz..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:12px; font-family:'Pixel'; margin-bottom:8px; outline:none;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="sendMsg()">GÖNDER</button>
                <button class="btn" onclick="getPhoto('normal')">FOTO İSTE</button>
                <button class="btn" id="nsfw-btn" onclick="getPhoto('plus')" style="color:var(--pink);">+18 FOTO</button>
                <button class="btn" id="marry-btn" onclick="tryMarry()" style="color:var(--gold);">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const lines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıkageldi, insanlar ve canavarlar.",
    "Canavarlar çok güçsüz olduğu için kaybettiler ve yeraltına hapsedildiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhu idi.",
    "İlki düştü 2, 3, 4, 5, 6... ve sıra 7'ye gelmişti; yani Frisk'e.",
    "Frisk düştüğünde Toriel onu karşıladı ve onla savaşan Frisk onu bağışladı.",
    "Ve ilk arkadaşını edindi; sonra Susie, Noelle, Undyne, Alphys ve Mettaton...",
    "Bariyer kırıldı, Frisk kayboldu. Sonra Kris, Toriel'in çocuğu oldu.",
    "Gayzerler, arkadaşlar, bunları zaten biliyorsunuz...",
    "Ama sonra bir sistem hatası oldu. W.D Gaster'ın bile çözemeyeceği bir hata!",
    "Bu hata yaşamı bir FLÖRT uygulamasına dönüştürdü.",
    "Sorumlusu ROARING KNIGHT! Bakalım o bu fırsatı nasıl kullanacak?"
];

let cur = 0, typing = false, sel = null, isMarried = false;
let pts = { love: 0, lust: 0, friend: 0, hate: 0 };

// Karakter Listesi (UT, DR ve UT Yellow Kızları)
let charList = [
    { n: "Susie", i: "1000005963.jpg", p: "Ne bakıyorsun? Baltamı denemek mi istiyorsun?" },
    { n: "Noelle", i: "1000006007.jpg", p: "Şey... Merhaba. Susie'nin nerede olduğunu biliyor musun?" },
    { n: "Toriel", i: "1000006008.jpg", p: "Hoş geldin küçük olan. Sana turta hazırlayabilirim." },
    { n: "Undyne", i: "1000006013.jpg", p: "NGAAHHH! Işığın parlıyor ama ruhun benim olacak!" },
    { n: "Alphys", i: "1000006014.jpg", p: "B-bu yeni bir anime mi? Çok heyecanlı!" },
    { n: "Muffet", i: "1000006015.jpg", p: "Ahuhu~ Bağışın için teşekkürler tatlım." },
    { n: "Martlet", i: "1000006032.jpg", p: "Hey! Ben Kraliyet Muhafızı Martlet. Buradan geçmek yasak!" }, // UT Yellow
    { n: "Ceroba", i: "1000006033.jpg", p: "Sana zarar vermek istemem ama görevim belli." }, // UT Yellow
    { n: "Kanako", i: "1000006034.jpg", p: "Babam nerede? Onu bulmama yardım eder misin?" }, // UT Yellow
    { n: "Chara", i: "1000006024.jpg", p: "Merhaba. Dünyayı beraber yok edelim mi?" },
    { n: "Frisk", i: "1000006026.jpg", p: "* Kararlılıkla sana bakıyor." },
    { n: "Kris (Girl Version)", i: "1000005962.jpg", p: "..." },
    { n: "Tasque Manager", i: "1000006025.jpg", p: "Disiplinli ol yoksa cezalandırılırsın." },
    { n: "Mew Mew", i: "1000006029.jpg", p: "Ben sadece bir oyuncak değilim!" },
    { n: "Queen", i: "1000006018.jpg", p: "Potasyum Almayı Unutma." },
    { n: "Temmie", i: "1000006010.jpg", p: "hOi!" }
];

// Listeyi 30'a tamamla
while(charList.length < 30) {
    charList.push({ n: "Deltarune Girl " + (charList.length), i: "1000006014.jpg", p: "Selam! Ben de bu dünyada aşkı arıyorum." });
}

function showNextLine() {
    if(typing || cur >= lines.length) return;
    typing = true;
    document.getElementById('z-btn').disabled = true;
    let text = lines[cur];
    let i = 0;
    document.getElementById('intro-text').innerText += (cur === 0 ? "" : "\n\n");
    
    function write() {
        if(i < text.length) {
            document.getElementById('intro-text').innerText += text[i];
            document.getElementById('type-sound').currentTime = 0;
            document.getElementById('type-sound').play().catch(()=>{});
            i++;
            setTimeout(write, 35);
        } else {
            typing = false;
            cur++;
            document.getElementById('z-btn').disabled = false;
            if(cur >= lines.length) {
                document.getElementById('z-btn').innerText = "BAŞLAT (Z)";
                document.getElementById('z-btn').onclick = startGame;
            }
        }
    }
    write();
}

window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'z' && document.getElementById('intro-screen').style.display !== 'none') showNextLine();
    if(e.key.toLowerCase() === 'x') startGame();
});

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    let g = document.getElementById('grid'); g.innerHTML = "";
    charList.forEach((c, idx) => {
        g.innerHTML += `<div class="char-card" onclick="selectChar(${idx})"><img src="${c.i}"><div>${c.n}</div></div>`;
    });
}

function selectChar(idx) {
    sel = charList[idx]; pts = { love: 0, lust: 0, friend: 0, hate: 0 }; isMarried = false;
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    document.getElementById('chat-window').innerHTML = "";
    addMsg(`* ${sel.n} ile karşılaştın.`, 'bot');
    addMsg(sel.p, 'bot');
    updateBars();
}

function sendMsg() {
    let i = document.getElementById('u-in'); if(!i.value.trim()) return;
    addMsg(i.value, 'user');
    let input = i.value; i.value = "";
    setTimeout(() => {
        let resp = `* ${sel.n}: "Söylediğin '${input}' kelimesi üzerine çok düşündüm. Bu dünyada sadece ikimiz kalsaydık bile senin bu derin düşüncelerin beni benden alırdı. Belki de Roaring Knight olman bir tesadüf değildir..."`;
        addMsg(resp, 'bot');
        pts.friend += 8; updateBars();
    }, 1000);
}

function openMenu(type) {
    document.getElementById('modal').style.display = "flex";
    let o = document.getElementById('modal-opts'); o.innerHTML = "";
    if(type === 'ACT') {
        ["Flört", "Öpücük", "Sohbet", "Dokun"].forEach(a => {
            o.innerHTML += `<button class="btn" onclick="act('${a}')">${a}</button>`;
        });
        if(isMarried) o.innerHTML += `<button class="btn" onclick="act('SEKS')" style="color:var(--pink);">SEKS</button>`;
    } else {
        ["Küfür", "Hakaret", "Ego", "Vur"].forEach(a => {
            o.innerHTML += `<button class="btn" onclick="act('${a}')" style="border-color:red;">${a}</button>`;
        });
    }
}

function act(a) {
    closeModal(); addMsg(`* (${a} eylemi yapılıyor...)`, 'user');
    setTimeout(() => {
        if(a === "Flört") { pts.love += 15; pts.lust += 10; addMsg(`* ${sel.n} utandı: "Bunu yapınca çok tatlı oluyorsun..."`, 'bot'); }
        else if(a === "Küfür") { pts.hate += 20; pts.love -= 10; addMsg(`* ${sel.n} kızdı: "Bir daha sakın bunu söyleme!"`, 'bot'); }
        else if(a === "SEKS") { addMsg(`* ${sel.n}: "Sadece senin için... Hazırım."`, 'bot'); }
        else { addMsg(`* ${sel.n} tepki verdi ve bağınız güçlendi.`, 'bot'); pts.friend += 5; }
        updateBars();
    }, 800);
}

function tryMarry() {
    if(pts.love >= 70) {
        isMarried = true;
        addMsg(`* TEBRİKLER! Artık ${sel.n} ile sevgilisiniz! +18 Özellikler açıldı.`, 'bot');
        document.getElementById('marry-btn').style.display = "none";
    } else {
        addMsg(`* ${sel.n}: "Üzgünüm ama henüz o kadar yakın değiliz. (En az %70 LOVE gerekli)"`, 'bot');
    }
}

function getPhoto(m) {
    if(m === 'plus' && !isMarried) {
        addMsg(`* ${sel.n}: "Önce sevgili olmamız gerekmiyor mu tatlım?"`, 'bot');
        return;
    }
    let q = "Deltarune Undertale " + sel.n + (m === 'plus' ? " R34" : "");
    window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`, '_blank');
}

function updateBars() {
    document.getElementById('love-f').style.width = Math.min(pts.love, 100) + "%";
    document.getElementById('lust-f').style.width = Math.min(pts.lust, 100) + "%";
    document.getElementById('friend-f').style.width = Math.min(pts.friend, 100) + "%";
    document.getElementById('hate-f').style.width = Math.min(pts.hate, 100) + "%";
    document.getElementById('marry-btn').style.display = (pts.love >= 70 && !isMarried) ? "block" : "none";
}

function addMsg(t, w) {
    let win = document.getElementById('chat-window');
    let d = document.createElement('div'); d.className = "msg " + w; d.innerText = t;
    win.appendChild(d); win.scrollTop = win.scrollHeight;
}

function closeModal() { document.getElementById('modal').style.display = "none"; }
function goBack() { document.getElementById('play-screen').style.display = 'none'; document.getElementById('select-screen').style.display = 'block'; }
</script>
</body>
</html>
