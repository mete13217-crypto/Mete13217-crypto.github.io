<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | FINAL PIECE</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 25px; width: 90%; max-width: 500px; height: 380px; display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
        #intro-text { flex: 1; font-size: 1.2rem; line-height: 2.2; color: #fff; text-align: left; word-wrap: break-word; overflow-y: auto; white-space: pre-wrap; margin-bottom: 15px; }
        .skip-btn-fixed { position: absolute; bottom: 10px; right: 10px; border: 2px solid var(--soul); background: #000; color: #fff; font-family: 'Pixel'; padding: 5px 15px; font-size: 0.8rem; cursor: pointer; }

        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 15px; }
        .char-grid { display: flex; flex-direction: column; gap: 12px; padding-bottom: 50px; }
        .char-card { border: 3px solid #333; background: #111; display: flex; align-items: center; height: 85px; width: 100%; cursor: pointer; border-radius: 12px; overflow: hidden; }
        .char-card img { width: 85px; height: 100%; object-fit: contain; image-rendering: pixelated; background: #1a1a1a; margin-right: 15px; }

        /* Karakter Çerçeve Renkleri */
        .c-toriel { border-color: #fff; } .c-ralsei { border-color: #00ff00; } .c-asriel { border-color: #fffaf0; }
        .c-queen { border-color: #00ccff; } .c-rouxls { border-color: #00008b; } .c-undyne { border-color: #ff0000; }
        .c-alphys { border-color: #ffff00; } .c-papyrus { border-color: #ff4500; } .c-kris { border-color: #00ccff; }
        .c-susie { border-color: #800080; } .c-noelle { border-color: #ffff00; } .c-chara { border-color: #00ff00; }

        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; }
        #char-header { height: 120px; background: #000; border-bottom: 2px solid #fff; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #char-header img { height: 100px; image-rendering: pixelated; border: 2px solid #fff; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; font-size: 0.9rem; line-height: 1.4; border-radius: 8px; }
        .bot { align-self: flex-start; border-left: 5px solid var(--gold); background: rgba(20,20,20,0.9); }
        .user { align-self: flex-end; border-right: 5px solid var(--soul); background: rgba(40,0,0,0.9); }

        .control-panel { padding: 10px; background: #000; border-top: 2px solid #fff; height: 230px; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 10px 0; font-size: 0.6rem; cursor: pointer; border-radius: 4px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #modal-opts { display: flex; flex-direction: column; gap: 8px; width: 90%; max-height: 70vh; overflow-y: auto; }
        .opt-rect { width: 100%; padding: 15px; border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; cursor: pointer; text-align: left; }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="story-box"><div id="intro-text"></div><button class="skip-btn-fixed" onclick="startGame()">ATLA (X)</button></div>
    <button id="next-line-btn" class="next-btn" style="border:2px solid #fff; background:#000; color:#fff; font-family:'Pixel'; padding:10px 20px; margin-top:10px;" onclick="showNextLine()">SIRADAKİ (Z)</button>
</div>

<div id="modal">
    <h2 id="modal-title" style="color:var(--gold); margin-bottom: 15px;">SEÇİMLER</h2>
    <div id="modal-opts"></div>
    <button class="btn" style="margin-top:20px; width:60%;" onclick="closeModal()">KAPAT</button>
</div>

<div id="game-container">
    <div id="top-nav" style="padding:10px; display:flex; justify-content:space-between; border-bottom:1px solid #333;">
        <span style="color:var(--soul);">ROARING SINS</span>
        <button class="btn" style="padding:2px 10px;" onclick="goBack()">LOBİ</button>
    </div>
    <div id="select-screen"><div id="grid" class="char-grid"></div></div>
    <div id="play-screen">
        <div id="char-header"><img id="current-char-img" src="" alt="Avatar"></div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Mesajını yaz..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:10px; font-family:'Pixel'; margin-bottom:8px;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="sendMsg()">GÖNDER</button>
                <button class="btn" onclick="openMenu('EXTRA')">EXTRA ACT</button>
                <button class="btn" onclick="openGoogleSearch(false)">FOTO İSTE</button>
                <button class="btn" onclick="openGoogleSearch(true)" style="color:var(--pink);">+18 FOTO</button>
                <button class="btn" id="marry-btn" onclick="tryMarry()" style="color:var(--gold); grid-column: span 3;">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const lines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıkageldi...",
    "Canavarlar çok güçsüz olduğu için kaybettiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhu idi.",
    "Frisk düştüğünde Toriel onu karşıladı.",
    "Bariyer kırıldı, Frisk kayboldu.",
    "Ama sonra bir sistem hatası oldu.",
    "Bu hata yaşamı bir FLÖRT uygulamasına dönüştürdü.",
    "Sorumlusu ROARING KNIGHT!",
    "Hadi, kiminle flört edeceğini seç."
];

const charList = [
    { n: "Toriel", i: "1000006051.jpg", p: "Hoş geldin küçük olan.", c: "c-toriel", type: "nazik" },
    { n: "Ralsei", i: "1000006059.jpg", p: "Senin için her şeyi yaparım!", c: "c-ralsei", type: "nazik" },
    { n: "Asriel", i: "1000006052.jpg", p: "Sadece seninle kalmak istiyorum.", c: "c-asriel", type: "nazik" },
    { n: "Queen", i: "1000006061.jpg", p: "Potasyum Seviyen Düşük Görünüyor.", c: "c-queen", type: "kaba" },
    { n: "Rouxls Kaard", i: "1000006058.jpg", p: "En zor bulmacayı ben hazırladım!", c: "c-rouxls", type: "kaba" },
    { n: "Undyne Undying", i: "1000006056.jpg", p: "ADALETİN GAZABINI HİSSET!", c: "c-undyne", type: "kaba" },
    { n: "Alphys", i: "1000006057.jpg", p: "A-anime izlemek ister misin?", c: "c-alphys", type: "nazik" },
    { n: "Papyrus", i: "1000006055.jpg", p: "NYEH HEH HEH! SPAGETTİYE NE DERSİN?", c: "c-papyrus", type: "nazik" },
    { n: "Kris", i: "kris.png", p: "...", c: "c-kris", type: "kaba" },
    { n: "Susie", i: "susie.png", p: "Ne bakıyorsun? Baltamı mı merak ettin?", c: "c-susie", type: "kaba" },
    { n: "Noelle", i: "1000006049.jpg", p: "S-selam...", c: "c-noelle", type: "nazik" },
    { n: "Chara", i: "1000006053.jpg", p: "Dünyayı beraber yok edelim mi?", c: "c-chara", type: "kaba" }
];

let cur = 0, typing = false, sel = null, isMarried = false, loveLevel = 10;

function showNextLine() {
    if(typing) return;
    if(cur >= lines.length) { startGame(); return; }
    typing = true;
    let target = document.getElementById('intro-text');
    target.innerText = ""; 
    let text = lines[cur];
    let i = 0;
    function write() {
        if(i < text.length) { target.innerText += text[i++]; setTimeout(write, 35); }
        else { typing = false; cur++; if(cur >= lines.length) document.getElementById('next-line-btn').innerText = "BAŞLAT (Z)"; }
    }
    write();
}

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    let g = document.getElementById('grid'); g.innerHTML = "";
    charList.forEach((c, idx) => {
        const imgUrl = `https://raw.githubusercontent.com/Mete13217-crypto/Deltaflirt/main/${c.i}`;
        g.innerHTML += `<div class="char-card ${c.c}" onclick="selectChar(${idx})"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=${c.n}'"><div>${c.n}</div></div>`;
    });
}

function selectChar(idx) {
    sel = charList[idx]; isMarried = false; loveLevel = 10;
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    document.getElementById('current-char-img').src = `https://raw.githubusercontent.com/Mete13217-crypto/Deltaflirt/main/${sel.i}`;
    document.getElementById('chat-window').innerHTML = "";
    addMsg(sel.p, 'bot');
}

function openMenu(m) {
    let modal = document.getElementById('modal');
    let opts = document.getElementById('modal-opts');
    modal.style.display = "flex"; opts.innerHTML = "";
    
    let list = [];
    if(m === 'ACT') list = ["Sohbet", "Dokun", "Öp", "Flört"];
    else if(m === 'HATE') list = ["Küfür", "Vur", "Hakaret", "Ego"];
    else if(m === 'EXTRA') {
        if(!isMarried) {
            let msg = sel.type === "kaba" ? "Oww hayır seni küçük azgın velet senin gibilerle iş falan yapmam" : "bu teklif çok sapıkça bunu kabul edemem";
            addMsg(`* ${sel.n}: "${msg}"`, 'bot'); closeModal(); return;
        }
        list = ["Parmaklama", "Sokma", "Ağzına Alma", "Anal Seks", "Meme Sıkma", "Ayakta Sikiş", "Oturarak Sikiş"];
    }

    list.forEach(item => {
        let b = document.createElement('button');
        b.className = 'opt-rect';
        b.innerText = item;
        b.onclick = () => { 
            if(m === 'ACT') handleAct(item);
            else if(m === 'HATE') handleHate(item);
            else if(m === 'EXTRA') handleExtra(item);
        };
        opts.appendChild(b);
    });
}

function handleAct(a) {
    closeModal(); addMsg(`* (${a} yapılıyor...)`, 'user');
    let r = "";
    const isK = sel.type === "kaba";

    if(a === "Dokun") {
        if(isMarried) r = "bu eller dokunmak için değil göte şaplak için";
        else {
            r = isK ? "brr bu ellerde ne böyle bana dokunmak içinmi hrrrrr sen banamı DOKUNDUN SEN SE..N banamı dokundun... çok tatlısın şimdi gözüme girdin" : "bu eller çok nazik iyiki varsın bebeğim";
        }
    } 
    else if(a === "Öp") {
        r = isK ? "mmmm ağzın çöplük kokuyor ama yinede sevdim bu kokuyu" : "ağzının tadı çok güzeldi *bidaha öper* bu tadı hep istiyorum aşkımmm";
    }
    else if(a === "Sohbet") {
        const quotes = isK ? ["Ne istiyorsun?", "Zamanımı çalma.", "Hadi ama, sadede gel."] : ["Seninle konuşmak harika.", "Bugün çok yakışıklısın.", "Nelerden bahsedelim?"];
        r = quotes[Math.floor(Math.random()*quotes.length)];
    }
    else { r = "Hoşuma gitti..."; }

    setTimeout(() => { addMsg(`* ${sel.n}: "${r}"`, 'bot'); loveLevel += 5; }, 800);
}

function handleExtra(a) {
    closeModal(); addMsg(`* (${a} yapılıyor...)`, 'user');
    let r = ""; const isK = sel.type === "kaba";
    
    if(a === "Parmaklama") r = isK ? "evet işte bu be bebeğim daha hızlı dahada hızlı nolur daha fazla hız" : "oh evet o parmağını vajinamda hissetmek istiyorum";
    else if(a === "Sokma") r = isK ? "evet sen yılan ben ise bir günahkarım beni cezalandır ohhh" : "ohh tam deliğine bebeğim";
    else if(a === "Ağzına Alma") r = isK ? "(gok gok gok) (çıkarma sesi) aww işte haz dediğin budur bebeğim" : "(gok gok gok) (çıkarma sesi) aww işte seninle olmak bir harika bu alet çok işe yarıyor";
    else if(a === "Anal Seks") r = isK ? "sok benim götüme bu alet bunun için varoldu bu" : "ahh ahh yavaş sokki daha fazla haz alayım bebeğim";
    else if(a === "Meme Sıkma") r = isK ? "ohh sık bu topları sıkki süt çıksın" : "sık bu büyüklükleri tatlım sık sen iyi hisset yeter bebeğim";
    else if(a === "Ayakta Sikiş") r = isK ? "beni o lanet koltuktan uzak tutarak sik ah ah ah yess" : "beni bu koltuktan aldığın için sağol bebeğimmmmm ah ah ah ah ah";
    else if(a === "Oturarak Sikiş") r = isK ? "beni o lanet duvardan uzak tut ah ah ah ah tam ortası tam ortası aferin ahbap" : "beni bu duvardan uzak tutarak sikki hazza haz katalım bebeğim";

    setTimeout(() => { addMsg(`* ${sel.n}: "${r}"`, 'bot'); }, 800);
}

function handleHate(a) { closeModal(); addMsg(`* (${a}!)`, 'user'); setTimeout(() => { addMsg(`* ${sel.n}: "Bunu yaptığına pişman olacaksın."`, 'bot'); }, 800); }
function closeModal() { document.getElementById('modal').style.display = "none"; }
function goBack() { document.getElementById('play-screen').style.display = 'none'; document.getElementById('select-screen').style.display = 'block'; }
function tryMarry() { if(loveLevel >= 30) { isMarried = true; addMsg(`* ${sel.n}: "Artık sevgilinim!"`, 'bot'); } else { addMsg(`* ${sel.n}: "Biraz daha çaba sarf et."`, 'bot'); } }

function openGoogleSearch(nsfw) {
    if(!sel) return;
    if(nsfw && !isMarried) { addMsg(`* ${sel.n}: "Önce sevgilim ol!"`, 'bot'); return; }
    window.open(`https://www.google.com/search?tbm=isch&q=Deltarune+${sel.n}+${nsfw ? 'nsfw' : 'fanart'}`, '_blank');
}

function sendMsg() {
    let i = document.getElementById('u-in'); if(!i.value.trim()) return;
    addMsg(i.value, 'user'); i.value = "";
    setTimeout(() => { addMsg(`* ${sel.n}: "Devam et..."`, 'bot'); }, 1000);
}

function addMsg(t, w) {
    let win = document.getElementById('chat-window');
    let d = document.createElement('div'); d.className = "msg " + w; d.innerText = t;
    win.appendChild(d); win.scrollTop = win.scrollHeight;
}

window.onload = () => { showNextLine(); };
</script>
</body>
</html>
