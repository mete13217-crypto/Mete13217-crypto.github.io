        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; transition: background 1.2s, filter 0.3s; }
        
        #chat-window { height: calc(100vh - 260px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.85); scroll-behavior: smooth; position: relative; z-index: 5; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; animation: slideIn 0.3s ease-out; word-wrap: break-word; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .msg:hover { transform: scale(1.02); }
        .bot { align-self: flex-start; border-color: var(--accent); background: linear-gradient(145deg, #120012, #000); border-left: 6px solid var(--accent); }
        .user { align-self: flex-end; border-color: #555; background: #1a1a1a; border-right: 6px solid #555; }
        
        /* Fotoğraf çözümü için görsel kartı */
        .photo-card { display: block; margin-top: 10px; border: 2px dashed #ff00ff; padding: 20px; text-align: center; background: #220022; color: #ff69b4; font-weight: bold; animation: pulse 1s infinite; cursor: pointer; }

        .panel { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 4px solid var(--accent); padding: 10px; height: 165px; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.7); }

        .bar-bg { width: 100%; background: #111; height: 8px; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .critical-hit { animation: flashRed 0.5s; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn { background: #000; color: #fff; border: 2px solid #fff; padding: 10px 5px; cursor: pointer; font-family: 'Pixel'; font-size: 0.72rem; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: #fff; color: #000; transform: translateY(2px); }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        #selector, #joke-modal { position: fixed; inset: 0; background: #000; z-index: 2000; padding: 25px; overflow-y: auto; text-align: center; }
        #joke-modal { display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        
        #achieve { position: fixed; top: -120px; left: 50%; transform: translateX(-50%); background: #000; color: gold; padding: 15px; border: 4px double gold; z-index: 3000; transition: 0.5s; font-size: 0.85rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes flashRed { 0% { filter: hue-rotate(90deg) drop-shadow(0 0 20px red); } 100% { filter: none; } }
        @keyframes shakeWindow { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(5px, -5px); } 60% { transform: translate(-5px, -5px); } 80% { transform: translate(5px, 5px); } }

function playFx(f, d, t='sine') {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = t; o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f; g.gain.setValueAtTime(0.05, audioCtx.currentTime);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
}

async function addMsgAsync(text, type, isHtml = false) {
    if(isTyping) return;

    const win = document.getElementById('chat-window');
    const d = document.createElement('div');
    d.className = `msg ${type}`;
    win.appendChild(d);

    if (type === 'user' || isHtml) {
        d.innerHTML = text;
        win.scrollTop = win.scrollHeight;
    } else {
        // Harf harf yazma
        let displayTxt = "";
        for(let i=0; i<text.length; i++) {
            displayTxt += text[i];
            d.innerText = displayTxt;
            if(text[i] !== ' ') playFx(cur.g==='MALE'?300:450, 0.03, cur.g==='MALE'?'square':'sine');
            win.scrollTop = win.scrollHeight;
            await new Promise(r => setTimeout(r, 25));
        }
    }
    isTyping = false; setButtonsState(false);
}

    });
}

// Fotoğraf Çözümü (Özellik 2 - Kökten Çözüm)
function reqPhoto() {
    if(isTyping) return;
    if(!isSevgili || lust < 75) { 
        addMsgAsync(cur.n + ": Henüz değil...", 'bot'); 
    } else {
        addMsgAsync(cur.n + ": Al bakalım... İstediğin her şeye bakabilirsin! ❤️", 'bot').then(() => {
            // Dışarıya link vermek yerine chat içine Sansürlü resim atıyor.
            const fakeImageHTML = `
                <div class="photo-card" onclick="alert('RESİM KAYDEDİLDİ!')">
                    <span style="font-size:2rem;">🔞</span><br>
                    <span style="letter-spacing:2px;">[CENSORED DATA]</span><br>
                    <small>(${cur.n}_secret.png)</small>
                </div>
            `;
            addMsgAsync(fakeImageHTML, 'bot', true);
            unlockAch("KOLEKSİYON TAMAMLANDI");
        });
    }
}

function marry() { 
    if(isTyping) return;
    isSevgili = true; love = 100; 
    addMsgAsync(cur.n + ": Artık sevgiliz Kris! Seni bırakmayacağım. ❤️", 'bot').then(() => {
        unlockAch("GERÇEK AŞK"); renderMainPanel(); updateUI(); 
    });
}

function talk() { 
    if(isTyping) return;
    let p = prompt("Ne dersin?"); 
    if(p) { 
        addMsgAsync("Knight: " + p, 'user').then(() => {
            addMsgAsync(cur.n + ": Hmm...", 'bot');
        });
    } 
}
