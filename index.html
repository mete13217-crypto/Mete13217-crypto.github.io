<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | ULTIMATE V2</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000000; --msg-bot: #1a1a1a; --border: #333; --gold: #ffd700; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ VE SEÇİM */
        #intro-screen { position: fixed; inset: 0; z-index: 100; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1s; }
        #game-container { display: none; height: 100vh; flex-direction: column; }
        
        #select-screen { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; background: #050505; 
        }

        .char-card { 
            border: 2px solid #222; border-radius: 4px; overflow: hidden; 
            cursor: pointer; transition: 0.2s; background: #111; position: relative;
        }
        .char-card:hover { border-color: var(--soul); transform: scale(1.03); z-index: 5; }
        .char-card img { width: 100%; height: 120px; object-fit: cover; filter: grayscale(50%); }
        .char-card:hover img { filter: grayscale(0%); }
        .char-name { padding: 8px; text-align: center; font-size: 0.8rem; background: #000; color: #fff; }

        /* CHAT SİSTEMİ */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .msg { max-width: 80%; padding: 12px; border: 2px solid #333; position: relative; animation: fadeIn 0.3s; }
        .bot { align-self: flex-start; border-left: 4px solid var(--gold); background: #0a0a0a; }
        .user { align-self: flex-end; border-right: 4px solid var(--soul); background: #1a0000; }

        .control-panel { padding: 15px; background: #000; border-top: 2px solid var(--soul); }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #444; color: white; padding: 12px; font-family: 'Pixel'; }
        
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; cursor: pointer; padding: 5px 10px; }
        .btn:hover { background: #fff; color: #000; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="introText" style="text-align:center; margin-bottom:20px;">...</div>
    <input type="text" id="playerName" placeholder="İSMİNİZ?" maxlength="10" style="text-align:center; margin-bottom:10px;">
    <button class="btn" onclick="startGame()">BAĞLANTI KUR</button>
</div>

<div id="game-container">
    <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; font-size:0.8rem;">
        <span id="user-display">RUH</span>
        <span style="color:yellow">KARAKTER SEÇİNİZ</span>
        <button class="btn" onclick="location.reload()" style="font-size:0.6rem;">RESET</button>
    </div>
    
    <div id="select-screen"></div>

    <div id="play-screen" style="display:none; flex:1; flex-direction:column;">
        <div id="chat-window"></div>
        <div class="control-panel">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Mesajını yaz ve [Z] tuşuna bas..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">GÖNDER</button>
            </div>
        </div>
    </div>
</div>

<script>
// GENİŞLETİLMİŞ KARAKTER LİSTESİ (20 KARAKTER)
const charData = [
    { n: "Kris", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=kris", s: "...", p: "Karanlık çocuk." },
    { n: "Ralsei", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=ralsei", s: "Merhaba! Seni gördüğüme çok sevindim!", p: "Karanlığın Prensi." },
    { n: "Susie", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=susie", s: "Ne bakıyorsun? Kavga mı istiyorsun?!", p: "Vahşi ve mor." },
    { n: "Noelle", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=noelle", s: "Ah, selam... Kris'i gördün mü acaba?", p: "Geyik çocuk." },
    { n: "Toriel", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=toriel", s: "Küçük çocuk, bir dilim turta ister misin?", p: "Eski kraliçe." },
    { n: "Asriel", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=asriel", s: "Sadece biraz daha zamanımız olsaydı...", p: "Umutların prensi." },
    { n: "Chara", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=chara", s: "Selam. Ben Chara. Teşekkürler.", p: "İlk insan." },
    { n: "Frisk", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=frisk", s: "-_-", p: "Kararlı ruh." },
    { n: "Sans", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=sans", s: "hey. kapıdaki şakayı duydun mu?", p: "Tembel iskelet." },
    { n: "Papyrus", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=papyrus", s: "NYEH HEH HEH! SPAGETTİYE HAZIR MISIN?", p: "Gelecekteki kraliyet muhafızı." },
    { n: "Undyne", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=undyne", s: "NGAAAAAHHHH! SAVAŞA HAZIRLAN!", p: "Mızraklı balık." },
    { n: "Alphys", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=alphys", s: "Ş-şey... Mew Mew Kissy Cutie izlemek ister misin?", p: "Kraliyet bilim insanı." },
    { n: "Mettaton", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=mettaton", s: "OH YES! IŞIKLAR, KAMERA, AKSİYON!", p: "Yıldız robot." },
    { n: "Rouxls Kaard", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=rouxls", s: "Seni Ahmak! Benim Bulmacalarımı Çözemezsin-eth!", p: "Bulmaca ustası." },
    { n: "Lancer", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=lancer", s: "Ho-ho! Kötü adamlar buraya gelmiş!", p: "Maça valesi." },
    { n: "Berdly", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=berdly", s: "Zekamı takip etmekte zorlanıyor musun?", p: "Akıllı kuş." },
    { n: "Spamton", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=spamton", s: "ŞİMDİ [Büyük Olma] ZAMANI!", p: "Satış elemanı." },
    { n: "Queen", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=queen", s: "Potasyumu Almayı Unutma (Ahmak)", p: "Siber kraliçe." },
    { n: "Asgore", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=asgore", s: "Biraz çay içer miyiz?", p: "Dağ altındaki kral." },
    { n: "Flowey", i: "https://api.dicebear.com/7.x/pixel-art/svg?seed=flowey", s: "Bu dünyada ya öldürürsün ya da ölürsün!", p: "Küçük bir çiçek." }
];

let selectedChar = null;

function startGame() {
    const name = document.getElementById('playerName').value;
    if(name) document.getElementById('user-display').innerText = name.toUpperCase();
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    
    const screen = document.getElementById('select-screen');
    charData.forEach((c, idx) => {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.onclick = () => selectChar(idx);
        card.innerHTML = `<img src="${c.i}"><div class="char-name">${c.n}</div>`;
        screen.appendChild(card);
    });
}

function selectChar(idx) {
    selectedChar = charData[idx];
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    addMsg(`* ${selectedChar.n} ile bir kanal açıldı.`, 'bot');
    addMsg(selectedChar.s, 'bot');
}

function addMsg(txt, type) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerText = txt;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

// %100000 GELİŞMİŞ KONUŞMA MOTORU (Basit Mantık Algoritması)
function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim().toLowerCase();
    if(!msg) return;

    addMsg(input.value, 'user');
    input.value = "";

    setTimeout(() => {
        let reply = "";
        const n = selectedChar.n;

        // Karakter Bazlı Akıllı Tepki Motoru
        if(msg.includes("nasılsın") || msg.includes("naber")) {
            if(n === "Sans") reply = "kemiklerim biraz yorgun ama iyidir.";
            else if(n === "Susie") reply = "Sana ne? Git başımdan (aslında fena değilim).";
            else if(n === "Ralsei") reply = "Harikayım! Seninle konuştuğum için çok mutluyum!";
            else reply = "İyiyim, sorduğun için teşekkürler!";
        } 
        else if(msg.includes("seviyom") || msg.includes("seviyorum")) {
            if(n === "Toriel") reply = "Ah, canım benim. Ben de seni seviyorum.";
            else if(n === "Papyrus") reply = "BUNU DUYMAK HARİKA! HARİKA PAPYRUS DA SENİ SEVİYOR!";
            else if(n === "Chara") reply = "İlginç bir duygu. Ruhunu bana mı veriyorsun?";
            else reply = "* Hafifçe gülümsedi.";
        }
        else if(msg.includes("kimsin")) {
            reply = `Ben ${selectedChar.n}. ${selectedChar.p}`;
        }
        else {
            // Genel Rasgele Cevaplar
            const generic = [
                "* Sessizlik hakim oluyor.",
                "Bunu daha önce duymamıştım.",
                "Vay canına, gerçekten mi?",
                "Anlıyorum... Devam et.",
                "* (Karakter sana tuhaf bir şekilde bakıyor.)"
            ];
            reply = generic[Math.floor(Math.random() * generic.length)];
        }

        addMsg(reply, 'bot');
    }, 1000);
}
</script>
</body>
</html>
