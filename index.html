<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | EMOCHI EDITION</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #050505; --pink: #ff69b4; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        #game-container { height: 100vh; display: flex; flex-direction: column; }
        #top-status { height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid var(--soul); }
        .stat-box { flex: 1; text-align: center; padding: 0 5px; }
        .stat-bar-bg { width: 100%; height: 6px; background: #222; margin-top: 4px; border-radius: 3px; overflow: hidden; border: 1px solid #444; }
        .stat-bar-fill { height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.1, 0.7, 0.1, 1); }

        .screen { display: none; position: absolute; inset: 0; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        #char-list { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; background: #000; }
        .char-card { background: #111; border: 2px solid #333; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .char-card:hover { border-color: var(--pink); background: #1a0510; }
        .char-card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(to bottom, #000, #1a0505); }
        .msg { max-width: 80%; padding: 12px; border-radius: 10px; position: relative; font-size: 0.9rem; line-height: 1.4; animation: slideUp 0.3s; }
        .msg.bot { align-self: flex-start; background: #222; border: 1.5px solid #444; color: #fff; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: var(--soul); color: #fff; }
        .msg.system { align-self: center; background: none; border: 1px dashed #666; color: var(--pink); font-size: 0.7rem; text-align: center; }

        .ui-panel { background: #000; border-top: 2px solid #333; padding: 15px; }
        .input-wrap { display: flex; gap: 10px; margin-bottom: 12px; }
        #chatInput { flex: 1; background: #151515; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; font-family: 'Pixel'; outline: none; }
        
        .emochi-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sub-menu { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .btn { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; font-family: 'Pixel'; font-size: 0.65rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-act { color: var(--gold); border-color: var(--gold); }
        .btn-hate { color: #ff4444; border-color: #ff4444; }
        .btn-photo { background: #333; grid-column: span 1; }
        .btn-nsfw { background: linear-gradient(45deg, #ff0000, #660000); color: white; border: none; font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-status">
        <div class="stat-box">
            <div style="font-size:0.5rem;">LOVE</div>
            <div class="stat-bar-bg"><div id="love-bar" class="stat-bar-fill" style="background: var(--pink)"></div></div>
        </div>
        <div class="stat-box">
            <div style="font-size:0.5rem;">LUST</div>
            <div class="stat-bar-bg"><div id="lust-bar" class="stat-bar-fill" style="background: var(--soul)"></div></div>
        </div>
        <div class="stat-box">
            <div style="font-size:0.5rem;">FEAR</div>
            <div class="stat-bar-bg"><div id="fear-bar" class="stat-bar-fill" style="background: #666"></div></div>
        </div>
    </div>

    <div id="menu-screen" class="screen active" style="justify-content:center; align-items:center; text-align:center;">
        <h1 style="color:red; font-size: 3rem; margin:0;">EMOCHI</h1>
        <p style="color:#888;">ROARING SINS EDITION</p>
        <button class="btn" onclick="switchScreen('select-screen')" style="padding:15px 40px; font-size:1rem; border-color:red; color:red;">GİRİŞ YAP</button>
    </div>

    <div id="select-screen" class="screen">
        <h2 style="text-align:center; padding:10px; color:var(--pink);">KARAKTER SEÇ</h2>
        <div id="char-list"></div>
    </div>

    <div id="play-screen" class="screen">
        <div id="chat-window"></div>
        <div class="ui-panel">
            <div class="input-wrap">
                <input type="text" id="chatInput" placeholder="Ona bir şeyler söyle...">
                <button class="btn" style="background:var(--soul); width:60px;" onclick="handleSend()">➔</button>
            </div>
            
            <div class="emochi-actions">
                <button class="btn btn-act" onclick="toggleMenu('act-menu')">ACT (EYLEMLER)</button>
                <button class="btn btn-hate" onclick="toggleMenu('hate-menu')">HATE (NEFRET)</button>
                <button class="btn btn-photo" onclick="requestPhoto(false)">FOTOĞRAF İSTE 📸</button>
                <button id="nsfw-btn" class="btn btn-nsfw" onclick="requestPhoto(true)">+18 İÇERİK 🔞</button>
            </div>

            <div id="act-menu" class="sub-menu">
                <button class="btn" onclick="aiInteract('chat')">SOHBET</button>
                <button class="btn" onclick="aiInteract('flirt')">İLTİFAT</button>
                <button class="btn" onclick="aiInteract('touch')">DOKUN</button>
            </div>

            <div id="hate-menu" class="sub-menu">
                <button class="btn" onclick="aiInteract('insult')">KÜFRET</button>
                <button class="btn" onclick="aiInteract('threat')">TEHDİT</button>
                <button class="btn" onclick="aiInteract('hit')">VUR</button>
            </div>
        </div>
    </div>
</div>

<script>
let partner = null;
let stats = { love: 10, lust: 0, fear: 0 };

const DB = [
    { 
        id: "susie", name: "Susie", tag: "susie_(deltarune)", 
        img: "https://vignette.wikia.nocookie.net/deltarune/images/2/23/Susie_portrait.png", 
        desc: "Sert ve vahşi bir canavar.",
        respond: (msg, s) => {
            if(s.lust > 50) return `* (Susie'nin yüzü aniden mora döner, baltasını yavaşça yere bırakır.) \n* Bak, normalde senin gibi birini duvara yapıştırıp 'ne bakıyorsun' derdim ama... Lanet olsun, içimdeki bu his ne?! Sanki bütün tebeşirler midemde aynı anda patlıyor. \n* Eğer bana öyle bakmaya devam edersen... sonucuna katlanmak zorunda kalırsın. Belki de... karanlıkta beraber daha 'özel' bir antrenman yapmalıyız?`;
            if(msg.includes("sevi") || msg.includes("aşk") || msg.includes("tatlı")) return `* Aşk mı? Hah! Ben sadece bir şeyleri parçalamayı ve pizza kutularını çiğnemeyi bilirim. \n* Ama... seninleyken nedense etrafımdaki her şeyi yakıp yıkmak istemiyorum. Bu bir çeşit büyü mü, yoksa sadece fazla mı naziksin? Her neyse, bunu bir daha başkasına söylersen seni ısırırım! Sadece benim yanımda böyle konuş.`;
            if(msg.includes("vurd") || msg.includes("nefret")) return `* Demek kavga istiyorsun ha? Sonunda gerçek bir karakter gösterdin! Baltamın tadına bakmaya hazır mısın? Seni haritanın dışına fırlatmadan önce son sözlerini söyle!`;
            return `* Hey! Boş boş kelimelerle kafamı şişirme. Gidip birilerini korkutalım ya da Lancer'ın yanına gidip ortalığı dağıtalım. Senin bu karmaşık cümlelerin devrelerimi yakıyor, sadece yanımda dur ve eşlik et işte!`;
        }
    },
    { 
        id: "noelle", name: "Noelle", tag: "noelle_holiday", 
        img: "https://vignette.wikia.nocookie.net/deltarune/images/8/82/Noelle_portrait.png", 
        desc: "Utangaç ve derin sırlar saklıyor.",
        respond: (msg, s) => {
            if(s.lust > 60) return `* Ellerim titriyor... Bu duyguyu daha önce sadece o karlı, karanlık gecede hissetmiştim. Kalbim göğüs kafesimi o kadar sert zorluyor ki, sanki dışarı fırlayacak. \n* Eğer biraz daha yaklaşırsan... her yerin buz tutmasını mı istiyorsun, yoksa sadece benim sıcaklığımı mı? Lütfen... ne istediğini bana fısılda.`;
            if(msg.includes("kork") || msg.includes("karanlık")) return `* Korkuyor muyum? Belki biraz... Ama senin yanındayken bu korku tuhaf bir güvene dönüşüyor. Sanki karanlık dünyanın derinliklerinde sonsuza dek kaybolsak bile, sen her zaman elimi tutup beni ışığa götürecekmişsin gibi hissediyorum. Lütfen... elimi asla bırakma.`;
            return `* Ah, bu çok ilginç bir düşünce! Babam da hep böyle söylerdi... Yani, her şeyin bir mantığı olmalı değil mi? Ama seninle konuşurken mantığımı kaybediyorum. Belki biraz daha vaktimizi beraber geçirmeliyiz? Belki bana bilmediğim şeyler öğretirsin...`;
        }
    },
    { 
        id: "queen", name: "Queen", tag: "queen_(deltarune)", 
        img: "https://vignette.wikia.nocookie.net/deltarune/images/a/a3/Queen_portrait.png", 
        desc: "Potasyum sever dijital kraliçe.",
        respond: (msg, s) => {
            let base = `* [SİSTEM ANALİZİ BAŞLATILDI]\n* Kullanıcı Girdisi: "${msg.toUpperCase()}"\n* Durum: `;
            if(s.lust > 40) return base + `Vay Canına. İşlemcim Normalden %400 Daha Hızlı Çalışıyor. Bu Bir Aşk Virüsü Mü Yoksa Sadece Senin Fazla Etkileyici Olman Mı? \n* Karar: Senin İçin Özel Bir Kafes Yaptırmalıyım. İçinde Sınırsız İnternet Ve Yumuşak Yastıklar Olacak. Hadi Gel Ve Potasyumunu Al Tatlım.`;
            return base + `Mesajınız Veri Tabanıma Kaydedildi. Cevap: Komik Bir Şekilde İlginç. Şimdi Lütfen Gidip Bir Muz Ye Ve Bana Yeni Bir Oyun Yükle. Dünya Egemenliği Planlarım Arasında Sana Da Bir Yer Ayırabilirim (Belki Küçük Bir Saray).`;
        }
    },
    { 
        id: "undyne", name: "Undyne", tag: "undyne", 
        img: "https://vignette.wikia.nocookie.net/deltarune/images/a/a2/Undyne_portrait.png", 
        desc: "Kraliyet Muhafızı lideri.",
        respond: (msg, s) => {
            if(s.lust > 40) return `* FUHUHU! Beni etkileyebileceğini mi sanıyorsun?! Ama dürüst olayım, bu cesaretin... hoşuma gitmiyor değil! \n* Mızrağımı yere bırakmamı istiyorsan, bana gerçekten ne kadar güçlü olduğunu kanıtlamalısın. Belki mutfakta, belki de savaş alanında... Ne dersin punk?!`;
            return `* NGAHHHHH! Daha yüksek sesle konuş! Kararlılıkla konuş! Eğer dünyayı kurtarmak (veya yıkmak) istiyorsan, bu pısırık tavırları bırakmalısın! Şimdi bana gerçek gücünü göster!`;
        }
    }
];

function renderList() {
    const list = document.getElementById('char-list');
    list.innerHTML = DB.map((c, i) => `
        <div class="char-card" onclick="selectChar(${i})">
            <img src="${c.img}">
            <b>${c.name}</b>
            <p style="font-size:0.5rem; color:#888;">${c.desc}</p>
        </div>`).join('');
}

function selectChar(i) {
    partner = DB[i];
    stats = { love: 15, lust: 0, fear: 0 };
    document.getElementById('chat-window').innerHTML = "";
    switchScreen('play-screen');
    addMsg(`* ${partner.name} ile bağlantı kuruldu.`, 'system');
    updateHUD();
}

function toggleMenu(id) {
    const menus = document.querySelectorAll('.sub-menu');
    menus.forEach(m => m.style.display = (m.id === id && m.style.display !== 'grid') ? 'grid' : 'none');
}

function aiInteract(action) {
    let userSim = "";
    if(action === 'chat') userSim = "Seninle konuşmak istiyorum.";
    if(action === 'flirt') userSim = "Çok güzelsin/etkileyicisin.";
    if(action === 'touch') userSim = "*Sana dokunuyorum*";
    if(action === 'insult') userSim = "Senden nefret ediyorum!";
    
    document.getElementById('chatInput').value = userSim;
    handleSend();
}

function handleSend() {
    const input = document.getElementById('chatInput');
    const userMsg = input.value.toLowerCase();
    if(!userMsg) return;

    addMsg(input.value, 'user');
    input.value = "";

    setTimeout(() => {
        if(userMsg.includes("sevi") || userMsg.includes("tatlı") || userMsg.includes("güzel") || userMsg.includes("flört")) {
            stats.love += 10;
            stats.lust += 5;
        }
        if(userMsg.includes("kötü") || userMsg.includes("aptal") || userMsg.includes("nefret") || userMsg.includes("vur")) {
            stats.fear += 12;
            stats.love -= 8;
        }
        if(userMsg.includes("*")) stats.lust += 15;

        let responseText = partner.respond ? partner.respond(userMsg, stats) : "* Sessizlik...";
        addMsg(responseText, 'bot');
        updateHUD();
    }, 800);
}

function requestPhoto(nsfw) {
    const minStat = nsfw ? 60 : 30;
    if(stats.lust < minStat && stats.love < minStat) {
        addMsg(`* ${partner.name}: "Henüz o kadar yakın değiliz... Biraz daha 'kararlılık' göster."`, 'bot');
        return;
    }
    addMsg(`* ${partner.name} fotoğrafı gönderiyor...`, 'system');
    setTimeout(() => {
        let url = nsfw ? `https://rule34.xxx/index.php?page=post&s=list&tags=${partner.tag}` : `https://www.google.com/search?q=${partner.tag}+fanart&tbm=isch`;
        window.open(url, '_blank');
    }, 1000);
}

function updateHUD() {
    document.getElementById('love-bar').style.width = Math.min(stats.love, 100) + "%";
    document.getElementById('lust-bar').style.width = Math.min(stats.lust, 100) + "%";
    document.getElementById('fear-bar').style.width = Math.min(stats.fear, 100) + "%";
    const nsfw = document.getElementById('nsfw-btn');
    if(stats.lust >= 60) {
        nsfw.style.boxShadow = "0 0 15px #ff0000";
        nsfw.innerHTML = "🔞 +18 AÇILDI 🔞";
    }
}

function addMsg(t, type) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = t;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='select-screen') renderList();
}
</script>
</body>
</html>
