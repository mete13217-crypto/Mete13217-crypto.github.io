<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS: ULTIMATE EDITION</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --main: #fff; --bg: #000; --accent: #fff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        #chat-window { height: calc(100vh - 220px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; animation: fadeIn 0.3s; }
        .bot { align-self: flex-start; border-color: var(--accent); background: #120012; }
        .user { align-self: flex-end; border-color: #555; background: #1a1a1a; }

        .panel { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 4px solid var(--accent); padding: 10px; height: 160px; z-index: 100; }
        #stats { display: flex; justify-content: space-between; padding: 10px; border-bottom: 2px solid #333; font-size: 0.8rem; background: #000; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn { background: #000; color: #fff; border: 2px solid #fff; padding: 10px; cursor: pointer; font-family: 'Pixel'; font-size: 0.75rem; text-transform: uppercase; }
        .btn:active { background: #fff; color: #000; }
        
        #selector, #joke-modal { position: fixed; inset: 0; background: #000; z-index: 2000; padding: 20px; overflow-y: auto; text-align: center; }
        #joke-modal { display: none; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #intro-screen input::placeholder { color: #555; }
    </style>
</head>
<body>

<div id="selector">
    <h1 id="main-title" style="color: #ff00ff; text-shadow: 2px 2px #00ffff;">ROARING SINS: ULTIMATE EDITION</h1>

    <div id="intro-screen">
        <p style="color:cyan;">
            Karanlık Çeşme yeniden açıldı.<br>
            Dünya ikiye bölündü.<br>
            Işık ve Karanlık tekrar savaşın eşiğinde...
        </p>

        <p>Adını yaz.</p>
        <input id="name-input" style="background:black;color:white;border:2px solid white;padding:8px;text-align:center;font-family:'Pixel';" placeholder="İsmini gir...">
        <br><br>
        <button class="btn" onclick="setName()">DEVAM ET</button>
    </div>

    <div id="gender-screen" style="display:none;">
        <p style="color:yellow;">Bu dünyada kaderini seçemezsin.</p>
        <p id="forced-name" style="color:red; white-space: pre-wrap;"></p>

        <p>Karşına çıkacak varlıkların türünü seç:</p>
        <button class="btn" style="border-color:#00ffff;" onclick="filterChars('MALE')">ERKEKLER</button>
        <button class="btn" style="border-color:#ff69b4;" onclick="filterChars('FEMALE')">KIZLAR</button>

        <div class="char-grid" id="char-list" style="margin-top:20px;"></div>
    </div>
</div>

<div id="stats">
    <div id="st-name">NAME: -</div>
    <div id="st-rel">RELATION: -</div>
    <div id="st-meters">L:0% | LV:0% | H:0%</div>
</div>

<div id="chat-window"></div>

<div class="panel">
    <div id="dynamic-actions" class="grid"></div>
</div>

<div id="joke-modal">
    <h2 id="modal-title" style="color:yellow;">SELECTOR</h2>
    <div class="char-grid" id="modal-content"></div>
    <button class="btn" style="margin-top:20px; width:100%;" onclick="closeModals()">CANCEL</button>
</div>

<script>
const ALL_CHARS = [
    { n: "Berdly", g: "MALE", c: "#00ccff", type: "SERIOUS", m: "Hmph. Kris. Challenge my superior intellect?", act: ["Ciddileş", "Konuş", "Sinirlendir", "Küfür Et", "KILL"] },
    { n: "Sans", g: "MALE", c: "#0055ff", type: "JOKER", m: "heh. selam buddy. hazır mısın eğlenmeye?", act: ["Dokun", "Flört", "Sohbet", "Yemek Ver", "JOKE"] },
    { n: "Spamton", g: "MALE", c: "#ffff00", type: "JOKER", m: "[[HEY HEY HEY]] KRIS! READY TO BE A [[BIG SHOT]]?!", act: ["Dokun", "Flört", "Sohbet", "Deal Yap", "JOKE"] },
    { n: "King", g: "MALE", c: "#9900ff", type: "FIGHTER", m: "...YOU. LIGHTNER. BOW BEFORE YOUR KING.", act: ["Ciddileş", "Konuş", "Sinirlendir", "Küfür Et", "FIGHT"] },
    { n: "Jevil", g: "MALE", c: "#ff00ff", type: "JOKER", m: "CHAOS! CHAOS! I CAN DO ANYTHING!", act: ["Dokun", "Flört", "Sohbet", "Kart Oyna", "JOKE"] },
    { n: "Toriel", g: "FEMALE", c: "#ffffff", m: "Hoş geldin yavrum, sana sıcak bir turta yaptım... 🍰", s: "Nazik" },
    { n: "Susie", g: "FEMALE", c: "#ff00ff", m: "Ne bakıyorsun punk? Kavga mı istiyorsun? 😈", s: "Kaba" },
    { n: "Ralsei", g: "FEMALE", c: "#00ff00", m: "Selam Kris! Sana yardım etmek için sabırsızlanıyorum! ✨", s: "Nazik" },
    { n: "Undyne", g: "FEMALE", c: "#0066ff", m: "NGAAAAH! Savaşmaya hazır mısın?! ⚔️", s: "Kaba" },
    { n: "Alphys", g: "FEMALE", c: "#ffff00", m: "U-um... Selam Kris. Anime izleyelim mi? 😖", s: "Nazik" },
    { n: "Tasque Manager", g: "FEMALE", c: "#00ffff", m: "Order. Disorder will not be tolerated. ⚡", s: "Kaba" },
    { n: "Mad Mew Mew", g: "FEMALE", c: "#ff66cc", m: "MEW MEW! Bu vücut mükemmel! 😾", s: "Kaba" },
    { n: "Muffet", g: "FEMALE", c: "#9933ff", m: "Ahuhuhu... Bir fincan çay deary? 🕸️", s: "Kaba" },
    { n: "Ceroba", g: "FEMALE", c: "#ff9933", m: "Oh... Hoş geldin Kris. 🦊", s: "Nazik" },
    { n: "Betty", g: "FEMALE", c: "#ff0066", m: "Hehe... Korkun çok tatlı görünüyor Kris. 😈", s: "Kaba" },
    { n: "Chara", g: "FEMALE", c: "#ff0000", m: "Heh. Dünyayı silmeye ne dersin partner? 🔪", s: "Kaba" },
    { n: "Frisk", g: "FEMALE", c: "#33ccff", m: "* Frisk sana şefkatle bakıyor. 💙", s: "Nazik" },
    { n: "Martlet", g: "FEMALE", c: "#66ffff", m: "Oops! Selam Kris! Puzzle yapalım mı? 🐦", s: "Nazik" }
];

let cur = null, love = 0, lust = 0, haz = 0, isSevgili = false, playerName = "KRIS";

function setName(){
    const val = document.getElementById("name-input").value.trim();
    document.getElementById("intro-screen").style.display = "none";
    document.getElementById("gender-screen").style.display = "block";
    document.getElementById("forced-name").innerText = `"${val || '...' }" mı?\n\nBu dünyada isim seçemezsin.\nSenin adın KRIS.`;
    
    addMsg("SİSTEM: Karanlık Çeşme aktif. Knight uyanıyor...", 'bot');
    addMsg("SİSTEM: KRIS yeniden yazılıyor...", 'bot');
    setTimeout(()=>{
        addMsg("Aniden gökyüzü yarılıyor. Roaring başlamak üzere...", 'bot');
    }, 800);
}

function filterChars(gender) {
    const list = document.getElementById('char-list');
    list.innerHTML = "";
    ALL_CHARS.filter(c => c.g === gender).forEach(char => {
        list.innerHTML += `<button class="btn" style="border-color:${char.c}; color:${char.c}" onclick="start('${char.n}')">${char.n}</button>`;
    });
}

function start(name) {
    cur = ALL_CHARS.find(x => x.n === name);
    document.getElementById('selector').style.display = 'none';
    document.documentElement.style.setProperty('--accent', cur.c);
    document.getElementById('st-name').innerText = "NAME: " + cur.n;
    love = 0; lust = 0; haz = 0; isSevgili = false;
    addMsg(cur.n + ": " + cur.m, 'bot');
    renderMainPanel();
    updateUI();
}

function renderMainPanel() {
    const panel = document.getElementById('dynamic-actions');
    panel.innerHTML = "";
    if(cur.g === "MALE") {
        cur.act.forEach(a => {
            let cls = "btn";
            if(a === "JOKE") cls += " btn-joke";
            if(a === "FIGHT" || a === "KILL") cls += " btn-fight";
            panel.innerHTML += `<button class="${cls}" onclick="handleMale('${a}')">${a}</button>`;
        });
    } else {
        panel.innerHTML = `
            <button class="btn" onclick="openGirlMenu('ACT')">ACT</button>
            <button class="btn" onclick="openGirlMenu('EXTRA')">EXTRA ACT</button>
            <button class="btn" onclick="talk()">KONUŞ</button>
            <button class="btn" style="grid-column: span 2" onclick="reqPhoto()">+18 FOTOĞRAF</button>
            <button id="marry-btn" class="btn" style="color:cyan; display:${love>=50 && !isSevgili ? 'block':'none'}" onclick="marry()">SEVGİLİ OL</button>
        `;
    }
    panel.innerHTML += `<button class="btn" onclick="location.reload()">GERİ</button>`;
}

function updateUI() {
    if(cur.g === "FEMALE") {
        document.getElementById('st-meters').innerText = `L:${lust}% | LV:${love}% | H:${haz}%`;
        document.getElementById('st-rel').innerText = "SEVGİLİ: " + (isSevgili ? "EVET ❤️" : "HAYIR");
    } else {
        document.getElementById('st-meters').innerText = "MODE: " + cur.type;
        document.getElementById('st-rel').innerText = "PLAYER: KRIS";
    }
}

function addMsg(t, type) {
    const win = document.getElementById('chat-window');
    const d = document.createElement('div');
    d.className = `msg ${type}`;
    d.innerText = t;
    win.appendChild(d);
    win.scrollTop = win.scrollHeight;
}

function getSpecialResponse(action) {
    const s = cur.s; 
    const responses = {
        "Flört": s === "Kaba" ? "Aww seni ahbap. Beni utandırıyorsun..." : "Sen benim gönlümün nelerle şekillendiğini bilen birisisin...",
        "Öp": s === "Kaba" ? "Aww ağzın çöplük kokuyor HAHAHAHA! Ama olsun yine de tadını seviyorum." : "Bu dudaklar çok tatlı... (Deyip tekrar öper) Bu tadı unutmak istemiyorum...",
        "Sarıl": s === "Kaba" ? "Bu kolları benle sarılmak için mi uzattın? Doğru yaptın bende bunu bekliyordum." : "Seninle bir ömür olmak istiyorum...",
        "Ağzına Alma": s === "Kaba" ? "(Gok gok) heh bu kadarmı yaha diplere sok desin" : "(Gok gok) bunun tadı çok iyi herzaman bunu istiyorum",
        "Sokmalı": s === "Kaba" ? "Heh kolsuzmusun tam deliği tuttursana" : "Sen çok profesyonelsin senle olmakla gurur duyuyorum",
        "Ayakta": s === "Kaba" ? "Beni bu lanet koltuktan kurtar" : "Beni bu koltuktan uzak tuttuğun için sağol bebeğimmm",
        "Oturarak": s === "Kaba" ? "Beni bu duvarda sikmediğin için seni övceğimimi zannettin" : "Sen kahramansın sen beni duvardan kurtardın"
    };
    return responses[action] || "Hmm... İlginç.";
}

function openGirlMenu(type) {
    const modal = document.getElementById('joke-modal');
    const content = document.getElementById('modal-content');
    document.getElementById('modal-title').innerText = type;
    modal.style.display = 'block';
    content.innerHTML = "";
    
    let opts = (type === 'ACT') ? ["Dokun", "Flört", "Sohbet", "Öp", "Sarıl"] : ["Ağzına Alma", "Sokmalı", "Ayakta", "Oturarak"];
    
    if(type === 'EXTRA' && (!isSevgili || lust < 75)) {
        content.innerHTML = "<p style='color:red; grid-column:span 2;'>KİLİTLİ! (Sevgili & %75+ Lust Gerekli)</p>";
        return;
    }

    opts.forEach(o => {
        content.innerHTML += `<button class="btn" onclick="handleGirlAction('${o}')">${o}</button>`;
    });
}

function handleGirlAction(opt) {
    closeModals();
    addMsg(`* (Knight ${opt} eylemini yaptı.)`, 'user');
    setTimeout(() => {
        lust += 15; love += 10; haz += 20;
        addMsg(cur.n + ": " + getSpecialResponse(opt), 'bot');
        updateUI();
        renderMainPanel();
    }, 600);
}

function reqPhoto() {
    if(!isSevgili) {
        let msg = cur.s === "Kaba" ? "Seni yaramaz küçük velet benle ilişkisi olmayanla sikişmiyorum!" : "Hey bu yaptığın sapıklıktır nolur düzelt kendini...";
        addMsg(cur.n + ": " + msg, 'bot');
    } else if(lust < 75) {
        addMsg(cur.n + ": Henüz o kadar ileri gitmeye hazır değilim Kris...", 'bot');
    } else {
        addMsg(cur.n + ": Madem istiyorsun... İşte sadece senin için bir poz! [SİSTEM: +18 GÖRSEL TANIMLANDI]", 'bot');
    }
}

function marry() {
    isSevgili = true; love = 100;
    addMsg(cur.n + ": Kalbimi kazandın Kris. Artık sadece seninim... ❤️", 'bot');
    renderMainPanel();
    updateUI();
}

function talk() {
    let p = prompt("Ne söylemek istersin?");
    if(p) { addMsg("Knight: " + p, 'user'); addMsg(cur.n + ": Söylediklerin kalbimi titretiyor...", 'bot'); }
}

function handleMale(act) {
    addMsg(`* (Knight ${act} seçti.)`, 'user');
    if(act === "JOKE") openJokeMenu();
    else if(act === "FIGHT") openFightMenu();
    else { addMsg(cur.n + ": İlginç bir hamle.", 'bot'); }
}

function openJokeMenu() {
    const modal = document.getElementById('joke-modal');
    const content = document.getElementById('modal-content');
    document.getElementById('modal-title').innerText = "JOKE MENU";
    modal.style.display = 'block';
    content.innerHTML = "";
    ["Pipis Bombası", "Kötü Pun", "Çelme Tak"].forEach(j => {
        content.innerHTML += `<button class="btn" onclick="doJoke('${j}')">${j}</button>`;
    });
}

function doJoke(j) {
    closeModals();
    addMsg(`* (${j} yapılıyor!)`, 'user');
    addMsg(cur.n + ": HEHEHE! " + j.toUpperCase() + "!", 'bot');
}

function openFightMenu() {
    const panel = document.getElementById('dynamic-actions');
    panel.innerHTML = `
        <button class="btn" style="border-color:red" onclick="handleFight('KILL')">KILL</button>
        <button class="btn" style="border-color:green" onclick="handleFight('MERCY')">MERCY</button>
    `;
}

function handleFight(t) {
    addMsg(`* (${t} SEÇİLDİ)`, 'user');
    addMsg(cur.n + ": " + (t==='KILL' ? "Bitti..." : "Pekala..."), 'bot');
    renderMainPanel();
}

function closeModals() { document.getElementById('joke-modal').style.display = 'none'; }
</script>
</body>
</html>
