<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | ULTIMATE</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 20px; width: 90%; height: 60vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #intro-text { flex: 1; font-size: 1.1rem; line-height: 1.6; color: #fff; text-align: left; overflow-y: auto; word-wrap: break-word; white-space: pre-wrap; }
        .intro-btns { display: flex; gap: 10px; margin-top: 15px; }

        /* OYUN ALANI */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 30px; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.6rem; text-align: center; height: 135px; cursor: pointer; }
        .char-card img { width: 100%; height: 100px; object-fit: contain; image-rendering: pixelated; background: #1a1a1a; margin-bottom: 2px; }

        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #stats-bar { background: #000; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid #fff; font-size: 0.55rem; }
        .meter-bg { height: 8px; background: #222; border: 1px solid #fff; }
        .meter-fill { height: 100%; width: 0%; transition: 0.5s; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .bot { align-self: flex-start; border-left: 5px solid var(--gold); background: rgba(20,20,20,0.9); }
        .user { align-self: flex-end; border-right: 5px solid var(--soul); background: rgba(40,0,0,0.9); }

        /* KONTROL PANELİ */
        .control-panel { padding: 12px; background: #000; border-top: 2px solid #fff; height: 210px; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 8px 0; font-size: 0.6rem; cursor: pointer; }

        /* MODAL VE FOTOĞRAF ÇERÇEVESİ */
        #modal, #photo-frame { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #photo-container { width: 90%; height: 70%; border: 4px double #fff; background: #111; position: relative; }
        #photo-container img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="story-box">
        <div id="intro-text"></div>
        <div class="intro-btns">
            <button id="z-btn" class="btn" style="flex:1;" onclick="showNextLine()">SIRADAKİ (Z)</button>
            <button class="btn" style="flex:1; border-color: var(--soul);" onclick="startGame()">ATLA (X)</button>
        </div>
    </div>
</div>

<div id="modal">
    <h2 id="modal-title" style="color:var(--gold)">EYLEMLER</h2>
    <div id="modal-opts" style="display:grid; grid-template-columns:1fr; gap:10px; width:80%;"></div>
    <button class="btn" style="margin-top:20px; width:50%;" onclick="closeModal()">GERİ</button>
</div>

<div id="photo-frame">
    <div id="photo-container">
        <img id="viewer-img" src="" alt="Yükleniyor...">
    </div>
    <button class="btn" style="margin-top:10px; width:40%;" onclick="closePhoto()">KAPAT</button>
</div>

<div id="game-container">
    <div id="top-nav" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; background:#000;">
        <span style="color:var(--soul);">ROARING KNIGHT</span>
        <button class="btn" style="padding:2px 10px;" onclick="goBack()">LOBİ</button>
    </div>
    <div id="select-screen"><div id="grid" class="char-grid"></div></div>
    <div id="play-screen">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-f" class="meter-fill" style="background:red"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-f" class="meter-fill" style="background:magenta"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-f" class="meter-fill" style="background:green"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-f" class="meter-fill" style="background:grey"></div></div></div>
        </div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Bir şeyler yaz..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:10px; font-family:'Pixel'; margin-bottom:10px; outline:none;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="sendMsg()">GÖNDER</button>
                <button class="btn" onclick="showPhoto('normal')">FOTO İSTE</button>
                <button class="btn" onclick="showPhoto('plus')" style="color:var(--pink);">+18 FOTO</button>
                <button class="btn" id="marry-btn" onclick="tryMarry()" style="color:var(--gold);">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const lines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıkageldi, insanlar ve canavarlar.",
    "Canavarlar çok güçsüz olduğu için kaybettiler ve yeraltına hapsedildiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhu idi.",
    "İlki düştü 2, 3, 4, 5, 6... ve sıra 7'ye gelmişti; yani Frisk'e.",
    "Frisk düştüğünde Toriel onu karşıladı ve onla savaşan Frisk onu bağışladı.\n\n",
    "Ve ilk arkadaşını edindi; sonra Susie, Noelle, Undyne, Alphys ve Mettaton...",
    "Bariyer kırıldı, Frisk kayboldu. Sonra Kris, Toriel'in çocuğu oldu.",
    "Gayzerler, arkadaşlar, bunları zaten biliyorsunuz...",
    "Ama sonra bir sistem hatası oldu. W.D Gaster'ın bile çözemeyeceği bir hata!",
    "Bu hata yaşamı bir FLÖRT uygulamasına dönüştürdü.\n\n",
    "Sorumlusu ROARING KNIGHT! Bakalım o bu fırsatı nasıl kullanacak?"
];

const charList = [
    { n: "Toriel", i: "toriel.png", p: "Hoş geldin küçük olan. Turta ister miydin?", type: "kind" },
    { n: "Papyrus", i: "papyrus.png", p: "NYEH HEH HEH! HARİKA BİR RANDEVUYA HAZIR MISIN?", type: "kind" },
    { n: "Muffet", i: "muffet.png", p: "Ahuhu~ Örümcek dansıma katılmak ister misin tatlım?", type: "kind" },
    { n: "Undyne", i: "undyne.png", p: "NGAAHH! ADALETİN MIZRAĞINDAN KAÇAMAZSIN!", type: "aggressive" },
    { n: "Alphys", i: "alphys.png", p: "Ş-şey... Anime izlemeyi sever misin?", type: "kind" },
    { n: "Roaring Knight", i: "roaring_knight.png", p: "Karanlık yükselecek...", type: "dark" },
    { n: "Kris", i: "kris.png", p: "...", type: "dark" },
    { n: "Susie", i: "susie.png", p: "Ne bakıyorsun? Baltamı denemek mi istiyorsun?", type: "aggressive" },
    { n: "Ralsei", i: "ralsei.png", p: "Sana nasıl yardımcı olabilirim dostum?", type: "kind" },
    { n: "Frisk", i: "frisk.png", p: "* Kararlılıkla dolu.", type: "kind" },
    { n: "Chara", i: "chara.png", p: "Merhaba. Dünyayı beraber yok edelim mi?", type: "dark" },
    { n: "Netty", i: "netty.png", p: "Sistemlerinizi kontrol ediyorum...", type: "kind" },
    { n: "Shyren", i: "shyren.png", p: "♫ Laaa laaa ♫", type: "kind" },
    { n: "Carol", i: "carol.png", p: "Selam!", type: "kind" },
    { n: "Mettaton", i: "mettaton.png", p: "IŞIKLAR! KAMERA! AKSİYON!", type: "aggressive" },
    { n: "MTT EX", i: "mtt_ex.png", p: "Bacaklarım için buradasın, değil mi?", type: "aggressive" },
    { n: "MTT NEO", i: "mtt_neo.png", p: "SAHNENİN SONU GELDİ!", type: "aggressive" },
    { n: "Clover", i: "clover.png", p: "Adalet her zaman kazanır.", type: "kind" },
    { n: "Ceroba", i: "ceroba.png", p: "Gelecek için her şeyi yaparım.", type: "dark" },
    { n: "Kanako", i: "kanako.png", p: "Anne nerede?", type: "kind" },
    { n: "Martlet", i: "martlet.png", p: "Kraliyet Muhafızı Martlet emrinizde!", type: "kind" },
    { n: "Mad Mew Mew", i: "mad_mew_mew.png", p: "Seni parçalarına ayıracağım sevimli şey!", type: "aggressive" },
    { n: "Tasque Manager", i: "tasque_manager.png", p: "Düzene itaat et.", type: "aggressive" },
    { n: "Lancer", i: "lancer.png", p: "HO-HO-HO! KÖTÜ ÇOCUK GELDİ!", type: "kind" },
    { n: "Dess", i: "dess.png", p: "Kayıp bir hatıra...", type: "dark" },
    { n: "Noelle", i: "noelle.png", p: "Susie'yi gördün mü?", type: "kind" }
];

let cur = 0, typing = false, sel = null, isMarried = false;
let pts = { love: 10, lust: 0, friend: 10, hate: 0 };

function showNextLine() {
    if(typing || cur >= lines.length) return;
    typing = true; document.getElementById('z-btn').disabled = true;
    let text = lines[cur]; let i = 0;
    document.getElementById('intro-text').innerText += (cur === 0 ? "" : "\n");
    function write() {
        if(i < text.length) {
            document.getElementById('intro-text').innerText += text[i];
            i++; setTimeout(write, 30);
        } else {
            typing = false; cur++; document.getElementById('z-btn').disabled = false;
            if(cur >= lines.length) { document.getElementById('z-btn').innerText = "BAŞLAT (Z)"; document.getElementById('z-btn').onclick = startGame; }
        }
    }
    write();
}

window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'z' && document.getElementById('intro-screen').style.display !== 'none') showNextLine();
    if(e.key.toLowerCase() === 'x') startGame();
});

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    let g = document.getElementById('grid'); g.innerHTML = "";
    charList.forEach((c, idx) => {
        const imgUrl = `https://raw.githubusercontent.com/Mete13217-crypto/Deltaflirt/main/${c.i}`;
        g.innerHTML += `<div class="char-card" onclick="selectChar(${idx})"><img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=${c.n}'"><div>${c.n}</div></div>`;
    });
}

function selectChar(idx) {
    sel = charList[idx]; pts = { love: 10, lust: 0, friend: 10, hate: 0 }; isMarried = false;
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    document.getElementById('chat-window').innerHTML = "";
    addMsg(sel.p, 'bot'); updateBars();
}

function sendMsg() {
    let i = document.getElementById('u-in'); if(!i.value.trim()) return;
    let input = i.value; addMsg(input, 'user'); i.value = "";
    setTimeout(() => {
        let resp = "";
        if(sel.type === "aggressive" || sel.type === "dark") {
            resp = `* ${sel.n}: "Hah, '${input}' mı dedin? Bu dünyadaki zayıf varlıkların aksine senin sözlerin biraz daha keskin Knight. Belki de bu yüzden Gaster seni seçti. Ruhundaki o karanlık... beni gerçekten cezbediyor."`;
        } else {
            resp = `* ${sel.n}: "Demek '${input}'... Bu ne kadar nazikçe! Senin gibi bir şövalye ile bu garip dünyada karşılaşmak gerçekten büyük bir şans. Sohbetimiz ruhumu ısıtıyor."`;
        }
        addMsg(resp, 'bot'); pts.friend += 8; updateBars();
    }, 1000);
}

function openMenu(type) {
    document.getElementById('modal').style.display = "flex";
    let o = document.getElementById('modal-opts'); o.innerHTML = "";
    if(type === 'ACT') {
        ["Flört", "Öpücük", "Sohbet", "Dokun"].forEach(a => { o.innerHTML += `<button class="btn" onclick="act('${a}', 'ACT')">${a}</button>`; });
        if(isMarried) o.innerHTML += `<button class="btn" onclick="act('SEKS', 'ACT')" style="color:var(--pink);">SEKS</button>`;
    } else {
        ["Küfür", "Hakaret", "Ego", "Vur"].forEach(a => { o.innerHTML += `<button class="btn" onclick="act('${a}', 'HATE')" style="border-color:red;">${a}</button>`; });
    }
}

function act(a, type) {
    closeModal(); addMsg(`* (${a} yapılıyor...)`, 'user');
    setTimeout(() => {
        if(type === 'HATE') {
            if(sel.type === "aggressive" || sel.type === "dark") {
                pts.love += 15; pts.hate -= 5;
                addMsg(`* ${sel.n}: "Sertliğini sevdim! Bana emir vermen veya küfretmen... Bu beni daha çok etkiliyor."`, 'bot');
            } else {
                pts.love -= 20; pts.hate += 30;
                addMsg(`* ${sel.n}: "Bunu yaptığına inanamıyorum! Senden nefret ediyorum!"`, 'bot');
            }
        } else {
            if(sel.type === "aggressive" && (a === "Flört" || a === "Öpücük")) {
                pts.love -= 10; pts.hate += 15;
                addMsg(`* ${sel.n}: "Yine mi o vıcık vıcık flörtlerin? Sıkıldım artık, bana biraz ciddiyet göster!"`, 'bot');
            } else {
                pts.love += 10; pts.lust += 5;
                addMsg(`* ${sel.n} bu ilgiden çok memnun kaldı.`, 'bot');
            }
        }
        updateBars();
    }, 800);
}

function showPhoto(m) {
    if(m === 'plus' && !isMarried) {
        addMsg(`* ${sel.n}: "SEN SAPIK MISIN? GİT YANIMDAN!"`, 'bot');
        pts.hate += 20; updateBars(); return;
    }
    const frame = document.getElementById('photo-frame');
    const img = document.getElementById('viewer-img');
    let q = (m === 'plus') ? `https://image.pollinations.ai/prompt/deltarune_character_${sel.n}_fanart_nsfw_style` : `https://source.unsplash.com/featured/?deltarune,${sel.n}`;
    img.src = q; frame.style.display = 'flex';
}

function tryMarry() {
    if(pts.love >= 75) {
        isMarried = true;
        addMsg(`* ${sel.n}: "Evet Knight! Seninle bir ömür flört etmeye hazırım! Artık özel resimlerime bakabilirsin."`, 'bot');
    } else {
        addMsg(`* ${sel.n}: "Daha senle tanışmıyorum bile, bunu yapamayız! (%75 LOVE gerekli)"`, 'bot');
    }
    updateBars();
}

function updateBars() {
    document.getElementById('love-f').style.width = Math.min(pts.love, 100) + "%";
    document.getElementById('lust-f').style.width = Math.min(pts.lust, 100) + "%";
    document.getElementById('friend-f').style.width = Math.min(pts.friend, 100) + "%";
    document.getElementById('hate-f').style.width = Math.min(pts.hate, 100) + "%";
    document.getElementById('marry-btn').style.display = isMarried ? "none" : "block";
}

function addMsg(t, w) {
    let win = document.getElementById('chat-window');
    let d = document.createElement('div'); d.className = "msg " + w; d.innerText = t;
    win.appendChild(d); win.scrollTop = win.scrollHeight;
}

function closeModal() { document.getElementById('modal').style.display = "none"; }
function closePhoto() { document.getElementById('photo-frame').style.display = "none"; }
function goBack() { document.getElementById('play-screen').style.display = 'none'; document.getElementById('select-screen').style.display = 'block'; }
</script>
</body>
</html>
