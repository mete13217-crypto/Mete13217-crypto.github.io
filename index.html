<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | ULTIMATE</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; --border: #fff; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI - SCROLL VE TAŞMA DÜZENLEMESİ */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        #story-box { border: 4px solid var(--border); background: #000; padding: 20px; width: 95%; max-width: 600px; height: 70vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #intro-text { flex: 1; font-size: 1.1rem; line-height: 1.5; color: #fff; overflow-y: auto; word-break: break-word; white-space: pre-wrap; padding-right: 5px; }
        
        /* OYUN ALANI */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 15px; background: #080808; }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding-bottom: 50px; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.7rem; text-align: center; cursor: pointer; transition: 0.2s; }
        .char-card:hover { border-color: var(--soul); transform: scale(1.02); }
        .char-card img { width: 100%; height: 100px; object-fit: contain; image-rendering: pixelated; background: #1a1a1a; }

        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; position: relative; }
        #stats-bar { background: #000; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-bottom: 2px solid var(--border); font-size: 0.6rem; }
        .meter-bg { height: 10px; background: #222; border: 1px solid #444; margin-top: 2px; }
        .meter-fill { height: 100%; width: 0%; transition: 0.5s ease; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px; border: 2px solid var(--border); font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; position: relative; }
        .bot { align-self: flex-start; border-left: 6px solid var(--gold); background: #111; }
        .user { align-self: flex-end; border-right: 6px solid var(--soul); background: #200000; }

        /* KONTROL PANELİ - SABİT VE DÜZENLİ */
        .control-panel { padding: 15px; background: #000; border-top: 2px solid var(--border); box-sizing: border-box; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn { border: 2px solid var(--border); background: #000; color: #fff; font-family: 'Pixel'; padding: 10px 5px; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; }
        .btn:active { background: #fff; color: #000; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="intro-screen">
    <div id="story-box">
        <div id="intro-text"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="z-btn" class="btn" style="flex:2;" onclick="handleZLogic()">SIRADAKİ (Z)</button>
            <button class="btn" style="flex:1; border-color: var(--soul);" onclick="startGame()">ATLA (X)</button>
        </div>
    </div>
</div>

<div id="modal">
    <h2 id="modal-title" style="color:var(--gold)">İŞLEMLER</h2>
    <div id="modal-opts" style="display:grid; grid-template-columns:1fr; gap:10px; width:80%;"></div>
    <button class="btn" style="margin-top:20px; width:50%;" onclick="closeModal()">GERİ</button>
</div>

<div id="game-container">
    <div id="top-nav" style="padding:12px; border-bottom:2px solid #333; display:flex; justify-content:space-between; align-items:center; background:#000;">
        <span style="color:var(--soul); letter-spacing: 2px;">ROARING KNIGHT</span>
        <button class="btn" style="padding:5px 15px;" onclick="goBack()">LOBİYE DÖN</button>
    </div>
    
    <div id="select-screen">
        <div id="grid" class="char-grid"></div>
    </div>

    <div id="play-screen">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-f" class="meter-fill" style="background:red"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-f" class="meter-fill" style="background:magenta"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-f" class="meter-fill" style="background:green"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-f" class="meter-fill" style="background:grey"></div></div></div>
        </div>
        
        <div id="chat-window"></div>

        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Mesajını buraya yaz..." 
                   style="width:100%; background:#000; color:#fff; border:2px solid #fff; padding:12px; font-family:'Pixel'; margin-bottom:12px; outline:none; box-sizing:border-box;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ETKİLEŞİM</button>
                <button class="btn" onclick="openMenu('HATE')">NEFRET</button>
                <button class="btn" onclick="sendMsg()" style="background: #222;">GÖNDER</button>
                <button class="btn" onclick="openGoogleImage(false)">FOTO ARA</button>
                <button class="btn" onclick="openGoogleImage(true)" style="color:var(--pink);">+18 ARA</button>
                <button class="btn" id="marry-btn" onclick="tryMarry()" style="color:var(--gold);">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const lines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıktı: İnsanlar ve Canavarlar.",
    "Canavarlar güçsüz olduğu için kaybettiler ve yeraltına hapsedildiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhuydu.",
    "İlki düştü, sonra diğerleri... Ve sıra 7. ruh Frisk'e geldi.",
    "Frisk her şeyi değiştirdi, herkesi bağışladı ve özgür bıraktı.",
    "Ama bir sistem hatası oluştu. W.D Gaster'ın bile öngöremediği bir hata!",
    "Bu hata dünyayı devasa bir FLÖRT uygulamasına dönüştürdü.",
    "Artık savaşmak yok, sadece etkilemek var.",
    "Sorumlusu ROARING KNIGHT! Bakalım bu kaosu nasıl yöneteceksin?"
];

// Karakter Listesi (Aynı kaldı)
const charList = [
    { n: "Toriel", i: "toriel.png", p: "Hoş geldin küçük olan. Turta ister miydin?", type: "kind" },
    { n: "Susie", i: "susie.png", p: "Ne bakıyorsun? Baltamı denemek mi istiyorsun?", type: "aggressive" },
    { n: "Noelle", i: "noelle.png", p: "S-selam... Susie'yi gördün mü?", type: "kind" },
    { n: "Ralsei", i: "ralsei.png", p: "Sana nasıl yardımcı olabilirim dostum?", type: "kind" },
    { n: "Undyne", i: "undyne.png", p: "NGAAHH! AŞK DA BİR SAVAŞTIR!", type: "aggressive" },
    { n: "Mettaton EX", i: "mtt_ex.png", p: "Bacaklarım için buradasın, değil mi sekerim?", type: "aggressive" },
    { n: "Chara", i: "chara.png", p: "Selam. Dünyayı beraber baştan çıkaralım mı?", type: "dark" }
    // ... diğer karakterler buraya eklenebilir
];

let curLine = 0, isTyping = false, selectedChar = null, isMarried = false;
let pts = { love: 10, lust: 0, friend: 10, hate: 0 };

// GİRİŞ MANTIK (Z TUŞU)
function handleZLogic() {
    if(isTyping) return;
    if(curLine < lines.length) {
        showNextLine();
    } else {
        startGame();
    }
}

function showNextLine() {
    isTyping = true;
    const btn = document.getElementById('z-btn');
    btn.disabled = true;
    
    let text = lines[curLine];
    let i = 0;
    const target = document.getElementById('intro-text');
    
    if(curLine !== 0) target.innerText += "\n\n";
    
    function type() {
        if(i < text.length) {
            target.innerText += text[i];
            target.scrollTop = target.scrollHeight;
            i++;
            setTimeout(type, 25);
        } else {
            isTyping = false;
            curLine++;
            btn.disabled = false;
            if(curLine >= lines.length) btn.innerText = "BAŞLAT (Z)";
        }
    }
    type();
}

// KLAVYE KONTROLLERİ
window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if(document.getElementById('intro-screen').style.display !== 'none') {
        if(key === 'z') handleZLogic();
        if(key === 'x') startGame();
    }
});

// OYUNU BAŞLAT
function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    const grid = document.getElementById('grid');
    grid.innerHTML = "";
    
    charList.forEach((c, idx) => {
        grid.innerHTML += `
            <div class="char-card" onclick="selectChar(${idx})">
                <img src="https://raw.githubusercontent.com/Mete13217-crypto/Deltaflirt/main/${c.i}" onerror="this.src='https://via.placeholder.com/150/111/fff?text=${c.n}'">
                <div style="padding:5px;">${c.n}</div>
            </div>`;
    });
}

function selectChar(idx) {
    selectedChar = charList[idx];
    pts = { love: 10, lust: 0, friend: 10, hate: 0 };
    isMarried = false;
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    document.getElementById('chat-window').innerHTML = "";
    addMsg(selectedChar.p, 'bot');
    updateBars();
}

// GOOGLE GÖRSEL ARAMA FONKSİYONU
function openGoogleImage(isNSFW) {
    if(!selectedChar) return;
    
    if(isNSFW && !isMarried) {
        addMsg(`* ${selectedChar.n}: "Sence aramızdaki bağ bunu istemek için yeterli mi? Önce sevgilim olmalısın!"`, 'bot');
        pts.hate += 15;
        updateBars();
        return;
    }

    let searchQuery = `Deltarune ${selectedChar.n}`;
    if(isNSFW) searchQuery += " fanart nsfw";
    
    const url = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(searchQuery)}`;
    window.open(url, '_blank');
}

function sendMsg() {
    const input = document.getElementById('u-in');
    if(!input.value.trim()) return;
    
    const text = input.value;
    addMsg(text, 'user');
    input.value = "";
    
    setTimeout(() => {
        let response = "";
        if(selectedChar.type === "aggressive") {
            response = `* ${selectedChar.n}: "Bu söylediğin '${text}'... İlginç. Ama beni etkilemek için daha fazlası lazım Knight!"`;
        } else {
            response = `* ${selectedChar.n}: "Oh, '${text}' mi? Ne kadar düşüncelisin. Kalbimi küt küt attırıyorsun..."`;
        }
        addMsg(response, 'bot');
        pts.love += 5;
        updateBars();
    }, 1000);
}

function openMenu(type) {
    document.getElementById('modal').style.display = "flex";
    const container = document.getElementById('modal-opts');
    container.innerHTML = "";
    
    const options = type === 'ACT' ? ["İltifat Et", "Öpücük Kondur", "Elini Tut", "Şaka Yap"] : ["Dalga Geç", "Bağır", "İt", "Kaba Davran"];
    
    options.forEach(opt => {
        container.innerHTML += `<button class="btn" onclick="performAction('${opt}', '${type}')">${opt}</button>`;
    });
    
    if(type === 'ACT' && isMarried) {
        container.innerHTML += `<button class="btn" style="color:var(--pink); border-color:var(--pink);" onclick="performAction('Özel Vakit', 'ACT')">ÖZEL VAKİT</button>`;
    }
}

function performAction(act, type) {
    closeModal();
    addMsg(`* (${act} yapıyorsun...)`, 'user');
    
    setTimeout(() => {
        if(type === 'ACT') {
            pts.love += 12; pts.lust += 5;
            addMsg(`* ${selectedChar.n} bu hareketinden çok etkilendi.`, 'bot');
        } else {
            pts.hate += 20; pts.love -= 10;
            addMsg(`* ${selectedChar.n}: "Bunu neden yapıyorsun? Gerçekten canımı yakıyorsun!"`, 'bot');
        }
        updateBars();
    }, 800);
}

function tryMarry() {
    if(pts.love >= 75) {
        isMarried = true;
        addMsg(`* ${selectedChar.n}: "EVET! Seninle her şeye varım Knight. Artık birbirimize aitiz..."`, 'bot');
        document.getElementById('marry-btn').style.display = "none";
    } else {
        addMsg(`* ${selectedChar.n}: "Henüz hazır değilim... (75 LOVE gerekli, şu an: ${pts.love})"`, 'bot');
    }
}

function updateBars() {
    document.getElementById('love-f').style.width = Math.min(pts.love, 100) + "%";
    document.getElementById('lust-f').style.width = Math.min(pts.lust, 100) + "%";
    document.getElementById('friend-f').style.width = Math.min(pts.friend, 100) + "%";
    document.getElementById('hate-f').style.width = Math.min(pts.hate, 100) + "%";
}

function addMsg(t, w) {
    const win = document.getElementById('chat-window');
    const d = document.createElement('div');
    d.className = `msg ${w}`;
    d.innerText = t;
    win.appendChild(d);
    win.scrollTop = win.scrollHeight;
}

function closeModal() { document.getElementById('modal').style.display = "none"; }
function goBack() { 
    document.getElementById('play-screen').style.display = 'none'; 
    document.getElementById('select-screen').style.display = 'block'; 
}
</script>
</body>
</html>
