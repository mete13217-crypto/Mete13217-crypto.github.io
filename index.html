<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS: THE CORE</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --main: #fff; --bg: #000; --accent: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }

        #brightness-overlay { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 9999; }

        /* Giriş Hikayesi */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        #intro-text { font-size: 1.1rem; line-height: 1.6; color: #fff; max-width: 600px; min-height: 180px; }

        /* Ana Menü */
        #main-menu { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
        .menu-title { font-size: 2.2rem; color: yellow; text-shadow: 3px 3px red; margin-bottom: 20px; }

        .btn { background: #000; color: #fff; border: 3px solid #fff; padding: 12px 25px; cursor: pointer; font-family: 'Pixel'; font-size: 0.9rem; width: 280px; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #fff; color: #000; border-color: yellow; }
        .btn-universe { border-color: #a333ff; color: #a333ff; }

        /* Alternatif Evrenler Paneli */
        #universe-modal { position: fixed; inset: 0; background: #000; z-index: 4500; display: none; flex-direction: column; padding: 20px; text-align: center; }
        .universe-list { display: grid; grid-template-columns: 1fr; gap: 15px; overflow-y: auto; margin-top: 20px; align-items: center; justify-items: center; }

        /* Yan Panel */
        #side-panel { position: fixed; top: 0; right: -300px; width: 260px; height: 100%; background: #111; border-left: 4px solid #fff; z-index: 4000; transition: 0.5s; padding: 20px; display: flex; flex-direction: column; }
        #side-panel.open { right: 0; }
    </style>
</head>
<body>

<div id="brightness-overlay"></div>

<div id="intro-screen">
    <div id="intro-text"></div>
    <button id="skip-btn" class="btn" style="margin-top:40px; display:none;" onclick="startGame()">MACERAYA BAŞLA</button>
</div>

<div id="main-menu">
    <h1 class="menu-title">ROARING SINS</h1>
    
    <button class="btn" onclick="window.open('https://mete13217-crypto.github.io/-ndex.html-/', '_blank')">KIZLAR BÖLÜMÜ</button>
    <button class="btn" onclick="window.open('https://example.com/boys', '_blank')">ERKEKLER BÖLÜMÜ</button>
    
    <button class="btn btn-universe" onclick="toggleUniverse(true)">ALTERNATİF EVRENLER</button>
    
    <button class="btn" style="border-color: #24A1DE; color: #24A1DE;" onclick="window.open('https://t.me/+Zu1-BqdP2sNjZTE0', '_blank')">TELEGRAM</button>
    <button class="btn" style="border-color: yellow; color: yellow;" onclick="toggleSidePanel()">DİĞER İŞLER</button>
</div>

<div id="universe-modal">
    <h2 style="color: #a333ff; font-size: 1.5rem;">MULTIVERSE SELECTOR</h2>
    
    <div class="universe-list">
        <button class="btn" style="border-color:#ff4655; color:#ff4655; width: 100%;" 
                onclick="window.open('https://mete13217-crypto.github.io/-ndex.html-xd/', '_blank')">
            VALORANT: GIRLS PROTOCOL
        </button>

        <button class="btn" style="border-color:#4db6ac; color:#4db6ac; width: 100%;" onclick="alert('Genshin Evreni Yakında!')">
            GENSHIN IMPACT: TEYVAT SINS
        </button>

        <button class="btn" style="border-color:#888; width: 100%;">DİĞER EVRENLER (1000+)</button>
    </div>
    
    <button class="btn" style="border-color:red; color:red; margin-top:30px;" onclick="toggleUniverse(false)">GERİ DÖN</button>
</div>

<div id="side-panel">
    <h2 style="color: #ff00ff;">İŞLEMLER</h2>
    <button class="btn" style="width:100%; margin-bottom:10px;" onclick="window.open('https://doeda.com', '_blank')">SITE 1</button>
    <button class="btn" style="width:100%;" onclick="window.open('https://7dak.com', '_blank')">SITE 2</button>
    
    <div style="margin-top:auto; padding-bottom:20px;">
        <label style="font-size:0.7rem;">PARLAKLIK:</label>
        <input type="range" min="0" max="80" value="0" style="width:100%;" oninput="adjustBrightness(this.value)">
        
        <button class="btn" style="width:100%; border-color:#E1306C; color:#E1306C; margin-top:15px;" 
                onclick="window.open('https://www.instagram.com/stealer_than_you?igsh=MTJuNXB2NTVtNXNlaA==', '_blank')">
            INSTAGRAM
        </button>
        <button class="btn" style="width:100%; border-color:red; margin-top:10px;" onclick="toggleSidePanel()">KAPAT</button>
    </div>
</div>

<script>
const storyLines = [
    "Eskiden, iki ırk dünyayı yönetirdi: İNSANLAR ve CANAVARLAR.",
    "Fakat bir gün, Karanlık Çeşme'nin derinliklerinden yeni bir güç doğdu.",
    "Roaring Knight, kutsal görevini unutup kendi karanlık arzularına yenik düştü.",
    "Knight'ın şehveti, tüm krallığı ebedi bir günahın içine sürükledi.",
    "Şimdi bu karanlıkta, kendi kaderini seçme sırası sende..."
];

let lineIdx = 0, charIdx = 0;
const introDiv = document.getElementById('intro-text');

function typeWriter() {
    if (charIdx < storyLines[lineIdx].length) {
        introDiv.innerHTML += storyLines[lineIdx].charAt(charIdx);
        charIdx++;
        setTimeout(typeWriter, 40);
    } else {
        setTimeout(nextSubtitle, 1800);
    }
}

function nextSubtitle() {
    lineIdx++;
    if (lineIdx < storyLines.length) {
        introDiv.innerHTML = ""; charIdx = 0; typeWriter();
    } else {
        document.getElementById('skip-btn').style.display = 'block';
    }
}

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';
}

function toggleSidePanel() { document.getElementById('side-panel').classList.toggle('open'); }
function toggleUniverse(show) { document.getElementById('universe-modal').style.display = show ? 'flex' : 'none'; }
function adjustBrightness(val) { document.getElementById('brightness-overlay').style.opacity = val / 100; }

window.onload = typeWriter;
</script>

</body>
</html>
