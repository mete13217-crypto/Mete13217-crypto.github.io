<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METE CORE HUB</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; color: #fff;
            font-family: sans-serif; overflow: hidden;
            transition: 0.3s;
        }

        /* ANA MENÜ DİZAYNI */
        .main-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; gap: 20px;
        }

        .menu-btn {
            width: 280px; padding: 18px;
            background: #111; color: #fff;
            border: 1px solid #fff; cursor: pointer;
            font-weight: bold; text-transform: uppercase;
            transition: 0.2s;
        }

        .menu-btn:active { background: #333; transform: scale(0.95); }

        /* SAĞ SEÇENEK ÇEKMECESİ (DRAWER) */
        #side-drawer {
            position: fixed; top: 0; right: -260px;
            width: 220px; height: 100%;
            background: #050505; border-left: 1px solid #fff;
            padding: 30px 20px; display: flex;
            flex-direction: column; gap: 15px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        #side-drawer.active { right: 0; }

        .drawer-btn {
            padding: 12px; background: transparent;
            color: #fff; border: 1px solid #444;
            cursor: pointer; font-size: 0.9rem;
        }

        /* ALTERNATİF EVRENLER PANELİ */
        #alt-panel {
            position: fixed; inset: 0;
            background: #000; display: none;
            flex-direction: column; align-items: center;
            justify-content: center; gap: 12px;
            z-index: 2000;
        }

        .options-trigger {
            position: fixed; top: 20px; right: 20px;
            background: #fff; color: #000;
            padding: 8px 15px; font-weight: bold;
            cursor: pointer; border: none; z-index: 500;
        }
    </style>
</head>
<body>

<button class="options-trigger" onclick="toggleDrawer()">SEÇENEKLER</button>

<div id="side-drawer">
    <h3 style="border-bottom: 1px solid #333; padding-bottom: 10px;">AYARLAR</h3>
    <button class="drawer-btn" onclick="toggleLight()">🌓 AYDINLIK</button>
    <button class="drawer-btn" onclick="nav('https://ig.me/j/AbYiS1GmEDX4mcEN/')">📸 INSTAGRAM</button>
    <button class="drawer-btn" style="color:red; border-color:red; margin-top:20px;" onclick="toggleDrawer()">✖ GERİ</button>
</div>

<div class="main-container">
    <h1 style="letter-spacing: 4px; margin-bottom: 30px;">ANA MENÜ</h1>
    
    <button class="menu-btn" onclick="openAlt()">🚀 ALTERNATİF EVRENLER</button>
    
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/Deltaflirt/')">💀 DELTARUNE</button>
    
    <button class="menu-btn" style="border-color:#0088cc;" onclick="nav('https://t.me/+Zu1-BqdP2sNjZTE0')">✈️ TELEGRAM</button>
</div>

<div id="alt-panel">
    <h2 style="margin-bottom: 25px;">EVREN SEÇİMİ</h2>
    
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/-ndex.html/')">🐲 DRAGON BALL</button>
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/Deltaflirt/')">🍥 NARUTO</button>
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/One-piece/')">🏴‍☠️ ONE PIECE</button>
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/-ndex.html-xd/')">🎯 VALORANT</button>
    <button class="menu-btn" onclick="nav('https://mete13217-crypto.github.io/Emojichat/')">✨ GENSHIN IMPACT</button>
    
    <button class="menu-btn" style="border-color:gray; margin-top:20px;" onclick="closeAlt()">⬅ ANA MENÜYE DÖN</button>
</div>

<script>
    // Link Yönlendirme
    function nav(url) {
        window.location.href = url;
    }

    // Çekmece Kontrolü
    function toggleDrawer() {
        document.getElementById('side-drawer').classList.toggle('active');
    }

    // Alternatif Evrenler Paneli Kontrolü
    function openAlt() {
        document.getElementById('alt-panel').style.display = 'flex';
    }

    function closeAlt() {
        document.getElementById('alt-panel').style.display = 'none';
    }

    // Aydınlık Mod (Filtre ile Basit Çözüm)
    function toggleLight() {
        if (document.body.style.filter === 'invert(1)') {
            document.body.style.filter = 'invert(0)';
            document.body.style.background = '#000';
        } else {
            document.body.style.filter = 'invert(1)';
            document.body.style.background = '#fff';
        }
    }
</script>

</body>
</html>
