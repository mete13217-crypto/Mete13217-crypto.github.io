<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | V12</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --pink: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI - DİKEY METİN KUTUSU */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 20px; width: 85%; height: 60vh; display: flex; flex-direction: column; box-sizing: border-box; }
        #intro-text { flex: 1; font-size: 1.1rem; line-height: 1.6; color: #fff; text-align: left; overflow-y: auto; word-wrap: break-word; white-space: pre-wrap; }
        .intro-btns { display: flex; gap: 10px; margin-top: 15px; height: 50px; }

        /* ANA OYUN */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 10px; background: #050505; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 20px; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.6rem; text-align: center; }
        .char-card img { width: 100%; height: 85px; object-fit: cover; image-rendering: pixelated; }

        /* SOHBET VE PANEL */
        #play-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #stats-bar { background: #000; padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid #fff; font-size: 0.55rem; }
        .meter-bg { height: 6px; background: #222; border: 1px solid #fff; position: relative; }
        .meter-fill { height: 100%; width: 0%; transition: 0.3s; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.9); }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .bot { align-self: flex-start; border-left: 5px solid var(--gold); }
        .user { align-self: flex-end; border-right: 5px solid var(--soul); }

        /* BUTONLAR PANELİ - SABİT */
        .control-panel { padding: 10px; background: #000; border-top: 2px solid #fff; z-index: 10; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 10px 0; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; }
        .btn:active { background: #fff; color: #000; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="type-sound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

<div id="intro-screen">
    <div id="story-box">
        <div id="intro-text"></div>
        <div class="intro-btns">
            <button id="z-btn" class="btn" style="flex:1;" onclick="showNextLine()">SIRADAKİ (Z)</button>
            <button class="btn" style="flex:1; border-color: var(--soul);" onclick="startGame()">ATLA (X)</button>
        </div>
    </div>
</div>

<div id="modal">
    <h2 id="modal-title">EYLEM</h2>
    <div id="modal-opts" style="display:grid; grid-template-columns:1fr; gap:10px; width:80%;"></div>
    <button class="btn" style="margin-top:20px; width:50%;" onclick="closeModal()">İPTAL</button>
</div>

<div id="game-container">
    <div id="top-nav" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; background:#000;">
        <span id="player-tag" style="color:var(--soul);">RUH</span>
        <button class="btn" style="padding:2px 10px;" onclick="goBack()">GERİ</button>
    </div>

    <div id="select-screen">
        <div style="color:var(--gold); padding:10px;">GİRİŞ YAPILABİLİR KIZLAR:</div>
        <div id="grid" class="char-grid"></div>
    </div>

    <div id="play-screen">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-f" class="meter-fill" style="background:red"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-f" class="meter-fill" style="background:magenta"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-f" class="meter-fill" style="background:green"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-f" class="meter-fill" style="background:grey"></div></div></div>
        </div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="u-in" placeholder="Bir mesaj yaz..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:12px; font-family:'Pixel'; margin-bottom:8px; outline:none;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="sendMsg()">GÖNDER</button>
                <button class="btn" onclick="getPhoto('normal')">FOTO İSTE</button>
                <button class="btn" onclick="getPhoto('plus')" style="color:var(--pink);">+18 FOTO</button>
                <button class="btn" id="love-btn" onclick="marry()" style="display:none; color:var(--gold);">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const lines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıkageldi, insanlar ve canavarlar.",
    "Canavarlar çok güçsüz olduğu için kaybettiler ve yeraltına hapsedildiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhu idi.",
    "İlki düştü 2, 3, 4, 5, 6... ve sıra 7'ye gelmişti; yani Frisk'e.",
    "Frisk düştüğünde Toriel onu karşıladı ve onla savaşan Frisk onu bağışladı.",
    "Ve ilk arkadaşını edindi; sonra Susie, Noelle, Undyne, Alphys ve Mettaton...",
    "Bariyer kırıldı, Frisk kayboldu. Sonra Kris, Toriel'in çocuğu oldu.",
    "Gayzerler, arkadaşlar, bunları zaten biliyorsunuz...",
    "Ama sonra bir sistem hatası oldu. W.D Gaster'ın bile çözemeyeceği bir hata!",
    "Bu hata yaşamı bir FLÖRT uygulamasına dönüştürdü.",
    "Sorumlusu ROARING KNIGHT! Bakalım o bu fırsatı nasıl kullanacak?"
];

let cur = 0;
let typing = false;
let charList = [
    { n: "Susie", i: "1000005963.jpg", p: "Bak çocuk, burası bir oyun parkı değil. Adımlarına dikkat et yoksa baltamla tanışırsın." },
    { n: "Noelle", i: "1000006007.jpg", p: "Ah... Merhaba! Şey, Susie'yi gördün mü? Beraber ödev yapacaktık da... Belki sen de katılmak istersin?" },
    { n: "Toriel", i: "1000006008.jpg", p: "Hoş geldin tatlım. Seni burada görmek ne güzel. Gel, sana taze pişmiş tarçınlı turta ikram edeyim." },
    { n: "Undyne", i: "1000006013.jpg", p: "FUHUHU! ADALETİN MIZRAĞINDAN KAÇAMAZSIN! Ama önce... Spagetti pişirmeyi öğrenmelisin!" },
    { n: "Muffet", i: "1000006015.jpg", p: "Ahuhu~ Örümcek dansına davetlisin tatlım. Ama giriş ücreti biraz... pahalı olabilir." },
    { n: "Queen", i: "1000006018.jpg", p: "Potasyum Almayı Unutma Yavrum. Sistemim Senin Çok Tatlı Olduğunu Söylüyor." },
    { n: "Alphys", i: "1000006014.jpg", p: "Ş-şey... Mew Mew Kissy Cutie 2 aslında o kadar kötü değil! İnan bana!" },
    { n: "Chara", i: "1000006024.jpg", t: "light", p: "Selam. Ben Chara. Ruhun çok lezzetli görünüyor. Onu benimle paylaşmaya ne dersin?" },
    { n: "Tasque Manager", i: "1000006025.jpg", p: "Burada her şey düzenli olmalı. Eğer dağınıklık çıkarırsan seni disipline etmek zorunda kalırım." },
    { n: "Temmie", i: "1000006010.jpg", p: "hOi! ben tEM! tEMmİe sEnİ ÇoK sEVDİ!!! tEMmİe kOLeJ pArAsI iSTİyoR!" },
    { n: "Maddy", i: "1000006029.jpg", p: "Bana 'sevimli' deme! Ben öfke doluyum! Ama... belki biraz flört edebiliriz." }
];
// 30 Karakter tamamlama mantığı (Dinamik eklenebilir)
while(charList.length < 30) { 
    charList.push({ n: "Kız Canavar " + (charList.length + 1), i: "1000006014.jpg", p: "Merhaba yabancı! Bu dünyada flört etmek çok eğlenceli!" });
}

let sel = null;
let pts = { love: 0, lust: 0, friend: 0, hate: 0 };

function showNextLine() {
    if(typing || cur >= lines.length) return;
    typing = true;
    document.getElementById('z-btn').disabled = true;
    let text = lines[cur];
    let i = 0;
    document.getElementById('intro-text').innerText += "\n\n"; // Boşluk ekle
    
    function write() {
        if(i < text.length) {
            document.getElementById('intro-text').innerText += text[i];
            document.getElementById('type-sound').currentTime = 0;
            document.getElementById('type-sound').play().catch(()=>{});
            i++;
            setTimeout(write, 35);
        } else {
            typing = false;
            cur++;
            document.getElementById('z-btn').disabled = false;
            if(cur >= lines.length) {
                document.getElementById('z-btn').innerText = "BAŞLAT (Z)";
                document.getElementById('z-btn').onclick = startGame;
            }
        }
    }
    write();
}

window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'z') {
        if(document.getElementById('intro-screen').style.display !== 'none') showNextLine();
    }
    if(e.key.toLowerCase() === 'x') startGame();
});

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    let g = document.getElementById('grid');
    g.innerHTML = "";
    charList.forEach((c, idx) => {
        g.innerHTML += `<div class="char-card" onclick="selectChar(${idx})"><img src="${c.i}"><div>${c.n}</div></div>`;
    });
}

function selectChar(idx) {
    sel = charList[idx];
    pts = { love: 0, lust: 0, friend: 0, hate: 0 };
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    addMsg(`* ${sel.n} ile karşılaştın.`, 'bot');
    addMsg(sel.p, 'bot');
    updateBars();
}

function addMsg(t, who) {
    let w = document.getElementById('chat-window');
    let d = document.createElement('div');
    d.className = "msg " + who;
    d.innerText = t;
    w.appendChild(d);
    w.scrollTop = w.scrollHeight;
}

function sendMsg() {
    let i = document.getElementById('u-in');
    if(!i.value.trim()) return;
    addMsg(i.value, 'user');
    let input = i.value;
    i.value = "";
    
    setTimeout(() => {
        let response = `* ${sel.n} senin söylediklerini dikkatle dinliyor. "${input}" hakkında uzun uzun düşünüyor ve sana derin bir cevap veriyor: "Bu gerçekten ilginç bir yaklaşım. Seninle vakit geçirmek ruhumu titretiyor..."`;
        addMsg(response, 'bot');
        pts.friend += 5;
        updateBars();
    }, 1000);
}

function openMenu(type) {
    document.getElementById('modal').style.display = "flex";
    let o = document.getElementById('modal-opts');
    o.innerHTML = "";
    if(type === 'ACT') {
        ["Flört", "Öpücük", "Sohbet", "Dokun", "SEKS"].forEach(a => {
            if(a === "SEKS" && (pts.love < 100 || pts.lust < 100)) return;
            o.innerHTML += `<button class="btn" onclick="act('${a}')">${a}</button>`;
        });
    } else {
        ["Küfür", "Hakaret", "Ego", "Vur"].forEach(a => {
            o.innerHTML += `<button class="btn" onclick="act('${a}')" style="border-color:red;">${a}</button>`;
        });
    }
}

function act(a) {
    closeModal();
    addMsg(`* (${a} eylemi uygulanıyor...)`, 'user');
    setTimeout(() => {
        if(a === "Flört") { pts.love += 15; pts.lust += 10; addMsg(`* ${sel.n} çok utandı ve yüzü kızardı!`, 'bot'); }
        else if(a === "Küfür") { pts.hate += 20; pts.love -= 10; addMsg(`* ${sel.n} sana nefretle baktı: "Haddini bil!"`, 'bot'); }
        else if(a === "SEKS") { addMsg(`* ${sel.n}: "Sana hayır diyemiyorum... Gel buraya."`, 'bot'); }
        else { addMsg(`* ${sel.n} bu eylemine şaşırdı ama hoşuna gitti.`, 'bot'); pts.friend += 10; }
        updateBars();
    }, 800);
}

function getPhoto(m) {
    if(m === 'plus' && pts.love < 100) {
        addMsg(`* ${sel.n}: "Daha o kadar yakın değiliz tatlım!"`, 'bot');
        return;
    }
    let q = "Deltarune Undertale " + sel.n + (m === 'plus' ? " R34" : "");
    window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`, '_blank');
}

function updateBars() {
    document.getElementById('love-f').style.width = pts.love + "%";
    document.getElementById('lust-f').style.width = pts.lust + "%";
    document.getElementById('friend-f').style.width = pts.friend + "%";
    document.getElementById('hate-f').style.width = pts.hate + "%";
    if(pts.love >= 75) document.getElementById('love-btn').style.display = "block";
}

function closeModal() { document.getElementById('modal').style.display = "none"; }
function goBack() { document.getElementById('play-screen').style.display = 'none'; document.getElementById('select-screen').style.display = 'block'; }
</script>
</body>
</html>
