<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS: THE STORY</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --main: #fff; --bg: #000; --accent: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }

        /* Parlaklık Katmanı */
        #brightness-overlay {
            position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 9999;
        }

        /* Giriş Hikayesi */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;
        }
        #intro-text { font-size: 1.2rem; line-height: 1.6; color: #fff; max-width: 600px; min-height: 200px; }

        /* Ses Sorgusu */
        #sound-prompt {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Ana Menü */
        #main-menu {
            display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }
        .menu-title { font-size: 2rem; color: yellow; text-shadow: 2px 2px red; margin-bottom: 20px; }

        /* Butonlar */
        .btn { 
            background: #000; color: #fff; border: 3px solid #fff; padding: 15px 30px; cursor: pointer; 
            font-family: 'Pixel'; font-size: 1rem; width: 250px; text-transform: uppercase; transition: 0.2s;
        }
        .btn:hover { background: #fff; color: #000; border-color: yellow; }
        .btn-tg { border-color: #24A1DE; color: #24A1DE; }

        /* Yan Panel */
        #side-panel {
            position: fixed; top: 0; right: -300px; width: 260px; height: 100%; background: #111; border-left: 4px solid #fff;
            z-index: 4000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        #side-panel.open { right: 0; }
        .side-title { color: #ff00ff; border-bottom: 2px solid #fff; padding-bottom: 10px; margin-bottom: 10px; }

        /* Ayarlar Alt Panel */
        #settings-area { margin-top: auto; border-top: 2px solid #555; padding-top: 20px; display: flex; flex-direction: column; gap: 10px; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #0f0; }
    </style>
</head>
<body>

<div id="brightness-overlay"></div>

<div id="intro-screen">
    <div id="intro-text"></div>
    <button id="skip-btn" class="btn" style="margin-top:40px; display:none;" onclick="showSoundPrompt()">DEVAM ET</button>
</div>

<div id="sound-prompt">
    <h2 style="color: cyan;">SİSTEM UYARISI</h2>
    <p>Ses paketi indirilsin mi?</p>
    <button class="btn" style="border-color:green; color:green; margin-bottom:10px;" onclick="handleSound(true)">EVET</button>
    <button class="btn" style="border-color:red; color:red;" onclick="handleSound(false)">HAYIR</button>
</div>

<div id="main-menu">
    <h1 class="menu-title">ROARING SINS</h1>
    
    <button class="btn" onclick="window.open('https://mete13217-crypto.github.io/-ndex.html-/', '_blank')">KIZLAR BÖLÜMÜ</button>
    
    <button class="btn" onclick="window.open('https://example.com/boys', '_blank')">ERKEKLER BÖLÜMÜ</button>
    
    <button class="btn btn-tg" onclick="window.open('https://t.me/+Zu1-BqdP2sNjZTE0', '_blank')">TELEGRAM GRUBU</button>
    
    <button class="btn" style="border-color: yellow; color: yellow;" onclick="toggleSidePanel()">DİĞER İŞLER</button>
</div>

<div id="side-panel">
    <h2 class="side-title">DİĞER İŞLER</h2>
    <button class="btn" style="width:100%;" onclick="window.open('https://doeda.com', '_blank')">SITE 1 (DOEDA)</button>
    <button class="btn" style="width:100%;" onclick="window.open('https://7dak.com', '_blank')">SITE 2 (7DAK)</button>
    
    <div id="settings-area">
        <h3 style="font-size: 0.8rem; color: #aaa;">AYARLAR</h3>
        <label style="font-size:0.7rem;">PARLAKLIK:</label>
        <input type="range" min="0" max="80" value="0" oninput="adjustBrightness(this.value)">
        
        <button class="btn" style="width:100%; border-color:#E1306C; color:#E1306C; font-size:0.6rem;" 
                onclick="window.open('https://www.instagram.com/stealer_than_you?igsh=MTJuNXB2NTVtNXNlaA==', '_blank')">
            INSTAGRAM
        </button>
        
        <button class="btn" style="width:100%; border-color:red; font-size:0.6rem;" onclick="toggleSidePanel()">PANELİ KAPAT</button>
    </div>
</div>

<script>
// --- HİKAYE SİSTEMİ ---
const storyLines = [
    "Eskiden, iki ırk dünyayı yönetirdi: İNSANLAR ve CANAVARLAR.",
    "Fakat bir gün, Karanlık Çeşme'nin derinliklerinden yeni bir güç doğdu.",
    "Roaring Knight, kutsal görevini unutup kendi karanlık arzularına yenik düştü.",
    "Artık savaş meydanları değil, arzuların yönettiği odalar yükseliyordu.",
    "Knight'ın şehveti, tüm krallığı ebedi bir günahın içine sürükledi.",
    "Şimdi bu karanlıkta, kendi kaderini seçme sırası sende..."
];

let lineIdx = 0;
let charIdx = 0;
const introDiv = document.getElementById('intro-text');

function typeWriter() {
    if (charIdx < storyLines[lineIdx].length) {
        introDiv.innerHTML += storyLines[lineIdx].charAt(charIdx);
        charIdx++;
        setTimeout(typeWriter, 50);
    } else {
        setTimeout(nextSubtitle, 2000);
    }
}

function nextSubtitle() {
    lineIdx++;
    if (lineIdx < storyLines.length) {
        introDiv.innerHTML = "";
        charIdx = 0;
        typeWriter();
    } else {
        document.getElementById('skip-btn').style.display = 'block';
    }
}

// --- SES VE MENÜ ---
function showSoundPrompt() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('sound-prompt').style.display = 'flex';
}

function handleSound(isYes) {
    if(isYes) {
        const link = document.createElement('a');
        link.href = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
        link.download = 'RoaringSins_OST.mp3';
        link.click();
    }
    document.getElementById('sound-prompt').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';
}

// --- PANEL VE AYARLAR ---
function toggleSidePanel() {
    document.getElementById('side-panel').classList.toggle('open');
}

function adjustBrightness(val) {
    // Range 0-80 arası çalışır, 0 en parlak, 80 en karanlık
    document.getElementById('brightness-overlay').style.opacity = val / 100;
}

// Başlat
window.onload = typeWriter;
</script>

</body>
</html>
