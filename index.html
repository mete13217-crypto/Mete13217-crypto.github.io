<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | V11</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; --dark: #4a0080; --light: #ffcc00; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* GİRİŞ EKRANI - DİKEY UYUMLU KUTU */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #story-box { border: 4px solid #fff; background: #000; padding: 20px; width: 85%; min-height: 300px; display: flex; flex-direction: column; justify-content: space-between; }
        #intro-text { font-size: 1rem; line-height: 1.5; color: #fff; text-align: left; }
        .intro-btns { display: flex; justify-content: space-between; margin-top: 15px; }

        /* OYUN ALANI */
        #game-container { display: none; height: 100vh; flex-direction: column; }
        #select-screen { flex: 1; overflow-y: auto; padding: 15px; background: #050505; }
        .group-title { font-size: 1.2rem; padding: 10px; margin-top: 15px; border-bottom: 2px solid #333; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px 0; }
        .char-card { border: 2px solid #333; background: #111; font-size: 0.6rem; text-align: center; overflow: hidden; }
        .char-card img { width: 100%; height: 80px; object-fit: cover; image-rendering: pixelated; }

        /* PANEL & METRELER */
        #stats-bar { background: rgba(0,0,0,0.9); padding: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; border-bottom: 2px solid #fff; font-size: 0.5rem; }
        .meter-bg { height: 6px; background: #222; border: 1px solid #fff; margin-top: 2px; }
        .meter-fill { height: 100%; width: 0%; transition: 0.3s; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px; border: 2px solid #fff; font-size: 0.85rem; line-height: 1.3; }
        .bot { align-self: flex-start; border-left: 4px solid var(--gold); background: #000; }
        .user { align-self: flex-end; border-right: 4px solid var(--soul); background: #111; }

        .control-panel { padding: 10px; background: #000; border-top: 2px solid #fff; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; padding: 8px 0; font-size: 0.6rem; cursor: pointer; }
        .btn:active { background: #fff; color: #000; }
        
        /* MODAL MENÜLER */
        #action-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<audio id="type-sound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

<div id="intro-screen">
    <div id="story-box">
        <div id="intro-text"></div>
        <div class="intro-btns">
            <button class="btn" style="width: 45%;" onclick="showNextLine()">SIRADAKİ (Z)</button>
            <button class="btn" style="width: 45%; border-color: red;" onclick="startGame()">ATLA (X)</button>
        </div>
    </div>
</div>

<div id="action-modal">
    <h2 id="modal-title">MENÜ</h2>
    <div id="modal-options" style="display: grid; grid-template-columns: 1fr; gap: 10px; width: 80%;"></div>
    <button class="btn" style="margin-top:20px; width: 50%;" onclick="closeModal()">KAPAT</button>
</div>

<div id="game-container">
    <div id="status-bar" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
        <span id="display-name" style="color:var(--soul);">RUH</span>
        <button class="btn" style="padding:2px 10px;" onclick="goBack()">ANA MENÜ</button>
    </div>

    <div id="select-screen">
        <div class="group-title" style="color:var(--light);">LIGHTNERS (KIZLAR)</div>
        <div id="lightner-grid" class="char-grid"></div>
        <div class="group-title" style="color:var(--dark);">DARKNERS (KIZLAR)</div>
        <div id="darkner-grid" class="char-grid"></div>
    </div>

    <div id="play-screen" style="display:none; flex:1; flex-direction:column;">
        <div id="stats-bar">
            <div>LOVE: <div class="meter-bg"><div id="love-fill" class="meter-fill" style="background:#f00"></div></div></div>
            <div>LUST: <div class="meter-bg"><div id="lust-fill" class="meter-fill" style="background:#f0f"></div></div></div>
            <div>FRIEND: <div class="meter-bg"><div id="friend-fill" class="meter-fill" style="background:#0f0"></div></div></div>
            <div>HATE: <div class="meter-bg"><div id="hate-fill" class="meter-fill" style="background:#555"></div></div></div>
        </div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <input type="text" id="userInput" placeholder="Mesaj gönder..." style="width:94%; background:#000; color:#fff; border:1px solid #fff; padding:10px; font-family:'Pixel'; margin-bottom:5px;">
            <div class="action-grid">
                <button class="btn" onclick="openMenu('ACT')">ACT</button>
                <button class="btn" onclick="openMenu('HATE')">HATE</button>
                <button class="btn" onclick="processAI()">GÖNDER</button>
                <button class="btn" onclick="requestPhoto('normal')">FOTO</button>
                <button class="btn" onclick="requestPhoto('plus')">+18 FOTO</button>
                <button class="btn" id="propose-btn" onclick="marry()" style="color:var(--gold); display:none;">SEVGİLİ OL</button>
            </div>
        </div>
    </div>
</div>

<script>
const storyLines = [
    "Uzun Zamanlar Önce 2 ırk arasında savaş çıkageldi...",
    "insanlar ve canavarlar...",
    "canavarlar çok güçsüz olduğu için kaybettiler ve yeraltına hapsedildiler.",
    "Bariyeri yıkmanın tek yolu 7 insan ruhu idi.",
    "İlki düştü 2, 3, 4, 5, 6... Ve sıra 7'ye gelmişti.",
    "Yani Frisk'e. Frisk düştüğünde Toriel onu karşıladı.",
    "Bağışladı ve ilk arkadaşını edindi.",
    "Sonra Susie, Noelle, Undyne, Alphys, Muffet ve nicesi...",
    "Bariyer kırıldı, Frisk kayboldu.",
    "Kris, Toriel'in çocuğu olarak yaşamaya başladı.",
    "Ama sonra bir sistem hatası oldu.",
    "W.D G.......'ın bile düzeltemeyeceği bir hata!",
    "Bu dünya bir FLÖRT uygulamasına dönüştü.",
    "Ve sorumlusu ROARING KNIGHT!",
    "Bakalım bu fırsatı nasıl kullanacaksın?"
];

let charData = [
    { n: "Susie", i: "1000005963.jpg", t: "light", p: "Sana balta fırlatmamı istemiyorsan düzgün konuş." },
    { n: "Noelle", i: "1000006007.jpg", t: "light", p: "Ah... Merhaba. Susie buralarda mı?" },
    { n: "Toriel", i: "1000006008.jpg", t: "light", p: "Hoş geldin küçük olan. Turta ister misin?" },
    { n: "Undyne", i: "1000006013.jpg", t: "light", p: "NGAAAHHH! SAVAŞMAYA HAZIR MISIN?" },
    { n: "Alphys", i: "1000006014.jpg", t: "light", p: "Ş-şey... Anime izlemek ister misin?" },
    { n: "Muffet", i: "1000006015.jpg", t: "light", p: "Fufufu~ Çay partime hoş geldin tatlım." },
    { n: "Queen", i: "1000006018.jpg", t: "dark", p: "Potasyum Almayı Unutma Yavrum." },
    { n: "Temmie", i: "1000006010.jpg", t: "light", p: "hOi! ben tEMMIE!" },
    { n: "Chara", i: "1000006024.jpg", t: "light", p: "Selam. Ruhunu bana mı vereceksin?" },
    { n: "Tasque Manager", i: "1000006025.jpg", t: "dark", p: "Düzen ve disiplin her şeydir." },
    { n: "Mettaton EX", i: "1000006015.jpg", t: "light", p: "Oh Yes! Işıklar üzerimde olmalı!" },
    { n: "Ralsei (Girl)", i: "1000005964.jpg", t: "dark", p: "Sana yardım etmek için buradayım!" },
    // 30 Karakteri tamamlayan diğer isimler...
    { n: "Frisk", i: "1000006026.jpg", t: "light", p: "..." },
    { n: "Bratty", i: "1000006027.jpg", t: "light", p: "Ay cidden mi tatlım?" },
    { n: "Catty", i: "1000006028.jpg", t: "light", p: "Miyav! Çöplerde harika şeyler buldum." },
    { n: "Mad Mew Mew", i: "1000006029.jpg", t: "light", p: "Beni kızdırma, pençelerimi çıkarırım!" },
    { n: "Sweet", i: "1000006030.jpg", t: "dark", p: "Müzik ruhun gıdasıdır." },
    { n: "Clover", i: "1000006031.jpg", t: "dark", p: "Üç baş, üç farklı fikir!" }
];

let curLine = 0;
let isTyping = false;
let selected = null;
let points = { love: 0, lust: 0, friend: 0, hate: 0 };

function showNextLine() {
    if(isTyping || curLine >= storyLines.length) return;
    isTyping = true;
    let txt = storyLines[curLine];
    let i = 0;
    document.getElementById('intro-text').innerText = "";
    const timer = setInterval(() => {
        if(i < txt.length) {
            document.getElementById('intro-text').innerText += txt[i];
            document.getElementById('type-sound').currentTime = 0;
            document.getElementById('type-sound').play().catch(()=>{});
            i++;
        } else {
            clearInterval(timer);
            isTyping = false;
            curLine++;
            if(curLine >= storyLines.length) startGame();
        }
    }, 40).catch(()=>{});
}

function startGame() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    renderGrid();
}

function renderGrid() {
    const l = document.getElementById('lightner-grid');
    const d = document.getElementById('darkner-grid');
    l.innerHTML = ""; d.innerHTML = "";
    charData.forEach((c, idx) => {
        const div = `<div class="char-card" onclick="select(${idx})"><img src="${c.i}"><div>${c.n}</div></div>`;
        if(c.t === 'light') l.innerHTML += div; else d.innerHTML += div;
    });
}

function select(idx) {
    selected = charData[idx];
    points = { love: 0, lust: 0, friend: 0, hate: 0 };
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';
    addMsg(`* ${selected.n} ile karşılaştın.`, 'bot');
    addMsg(selected.p, 'bot');
    updateMeters();
}

function updateMeters() {
    document.getElementById('love-fill').style.width = points.love + "%";
    document.getElementById('lust-fill').style.width = points.lust + "%";
    document.getElementById('friend-fill').style.width = points.friend + "%";
    document.getElementById('hate-fill').style.width = points.hate + "%";
    
    if(points.love >= 75) document.getElementById('propose-btn').style.display = "block";
    if(points.love >= 100 && points.lust >= 100) {
        addMsg(`* ${selected.n}: "...beni birazcık daha azdırır mısın?"`, 'bot');
    }
}

function openMenu(type) {
    const modal = document.getElementById('action-modal');
    const opts = document.getElementById('modal-options');
    modal.style.display = "flex";
    opts.innerHTML = "";
    
    if(type === 'ACT') {
        const actions = ["Flört", "Öpücük", "Sohbet", "Dokun"];
        if(points.love >= 100 && points.lust >= 100 && points.friend >= 100) actions.push("SEKS");
        actions.forEach(a => {
            opts.innerHTML += `<button class="btn" onclick="execute('${a}')">${a}</button>`;
        });
    } else {
        ["Küfür", "Hakaret", "Ego", "Vur"].forEach(a => {
            opts.innerHTML += `<button class="btn" onclick="execute('${a}')">${a}</button>`;
        });
    }
}

function execute(act) {
    closeModal();
    addMsg(`* (${act} eylemi yapılıyor...)`, 'user');
    
    setTimeout(() => {
        let reply = "";
        if(act === "Flört") { points.love += 10; points.lust += 5; reply = selected.n + " kızardı."; }
        else if(act === "SEKS") { reply = selected.n + ": 'Bunu bekliyordum...'"; }
        else if(act === "Küfür") { points.hate += 20; points.love -= 10; reply = selected.n + " sana tiksinerek bakıyor."; }
        else { reply = selected.n + " tepki veriyor."; points.friend += 5; }
        
        addMsg(reply, 'bot');
        updateMeters();
    }, 800);
}

function addMsg(t, type) {
    const win = document.getElementById('chat-window');
    const d = document.createElement('div');
    d.className = "msg " + type;
    d.innerText = t;
    win.appendChild(d);
    win.scrollTop = win.scrollHeight;
}

function processAI() {
    const input = document.getElementById('userInput');
    if(!input.value.trim()) return;
    addMsg(input.value, 'user');
    input.value = "";
    setTimeout(() => {
        addMsg(`* ${selected.n} seninle derin bir sohbete girdi.`, 'bot');
    }, 600);
}

function requestPhoto(m) {
    if(m === 'plus' && points.love < 100) {
        addMsg(`* ${selected.n}: "O kadar değil!"`, 'bot');
        return;
    }
    let q = "Deltarune Undertale " + selected.n + (m === 'plus' ? " R34" : "");
    window.open(`https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`, '_blank');
}

function closeModal() { document.getElementById('action-modal').style.display = "none"; }
function goBack() { document.getElementById('play-screen').style.display = 'none'; document.getElementById('select-screen').style.display = 'block'; }
</script>
</body>
</html>
