<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS: CORE V3</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --main: #fff; --bg: #000; --accent: #ff69b4; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }

        #brightness-overlay { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 9999; }

        /* Ana Menü */
        #main-menu { display: flex; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 15px; background: radial-gradient(circle, #1a001a 0%, #000 100%); }
        .menu-title { font-size: 2.2rem; color: yellow; text-shadow: 3px 3px red; margin-bottom: 25px; letter-spacing: 2px; }

        .btn { background: #000; color: #fff; border: 3px solid #fff; padding: 12px 25px; cursor: pointer; font-family: 'Pixel'; font-size: 0.9rem; width: 280px; text-transform: uppercase; transition: 0.2s; position: relative; }
        .btn:hover { background: #fff; color: #000; border-color: yellow; transform: scale(1.05); }
        
        /* Alternatif Evrenler Butonu Özel Rengi */
        .btn-universe { border-color: #a333ff; color: #a333ff; }

        /* Alternatif Evrenler Paneli (Multiverse) */
        #universe-modal { position: fixed; inset: 0; background: #000; z-index: 4500; display: none; flex-direction: column; padding: 20px; text-align: center; justify-content: center; }
        .universe-list { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 400px; margin: 20px auto; }

        /* Yan Panel */
        #side-panel { position: fixed; top: 0; right: -300px; width: 260px; height: 100%; background: #111; border-left: 4px solid #fff; z-index: 4000; transition: 0.5s; padding: 20px; display: flex; flex-direction: column; }
        #side-panel.open { right: 0; }
        
        .glow-text { animation: glow 1.5s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 5px #fff, 0 0 10px #ff69b4; } to { text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4; } }
    </style>
</head>
<body>

<div id="brightness-overlay"></div>

<div id="main-menu">
    <h1 class="menu-title glow-text">ROARING SINS</h1>
    
    <button class="btn" style="border-color: #ff69b4; color: #ff69b4;" onclick="window.open('https://mete13217-crypto.github.io/-ndex.html-/', '_blank')">KIZLAR BÖLÜMÜ</button>
    
    <button class="btn btn-universe" onclick="toggleUniverse(true)">ALTERNATİF EVRENLER</button>
    
    <button class="btn" style="border-color: #24A1DE; color: #24A1DE;" onclick="window.open('https://t.me/+Zu1-BqdP2sNjZTE0', '_blank')">TELEGRAM</button>
    
    <button class="btn" style="border-color: yellow; color: yellow;" onclick="toggleSidePanel()">DİĞER İŞLER</button>
</div>

<div id="universe-modal">
    <h2 style="color: #a333ff; font-size: 1.8rem; text-shadow: 2px 2px #fff;">MULTIVERSE</h2>
    
    <div class="universe-list">
        <button class="btn" style="border-color:#ff4655; color:#ff4655;" onclick="window.open('https://mete13217-crypto.github.io/-ndex.html-xd/', '_blank')">VALORANT: GIRLS</button>

        <button class="btn" style="border-color:#4db6ac; color:#4db6ac;" onclick="window.open('https://mete13217-crypto.github.io/Emojichat/', '_blank')">GENSHIN IMPACT: TEYVAT</button>

        <button class="btn" style="border-color:#555; color:#555;">YENİ EVRENLER (YAKINDA)</button>
    </div>
    
    <button class="btn" style="border-color:red; color:red; margin-top:30px; width: 150px; align-self: center;" onclick="toggleUniverse(false)">GERİ</button>
</div>

<div id="side-panel">
    <h2 style="color: #ff00ff;">AYARLAR</h2>
    <button class="btn" style="width:100%; margin-bottom:10px;" onclick="window.open('https://doeda.com', '_blank')">SITE 1</button>
    <button class="btn" style="width:100%;" onclick="window.open('https://7dak.com', '_blank')">SITE 2</button>
    
    <div style="margin-top:auto; padding-bottom:20px;">
        <label style="font-size:0.7rem;">EKRAN PARLAKLIĞI:</label>
        <input type="range" min="0" max="90" value="0" style="width:100%;" oninput="adjustBrightness(this.value)">
        
        <button class="btn" style="width:100%; border-color:#E1306C; color:#E1306C; margin-top:15px;" 
                onclick="window.open('https://www.instagram.com/stealer_than_you?igsh=MTJuNXB2NTVtNXNlaA==', '_blank')">INSTAGRAM</button>
        <button class="btn" style="width:100%; border-color:red; margin-top:10px;" onclick="toggleSidePanel()">KAPAT</button>
    </div>
</div>

<script>
    function toggleSidePanel() { document.getElementById('side-panel').classList.toggle('open'); }
    function toggleUniverse(show) { document.getElementById('universe-modal').style.display = show ? 'flex' : 'none'; }
    function adjustBrightness(val) { document.getElementById('brightness-overlay').style.opacity = val / 100; }
</script>

</body>
</html>
