<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROARING SINS | ULTIMATE V4</title>
    <style>
        @font-face { font-family: 'Pixel'; src: url('https://fonts.cdnfonts.com/s/16218/DeterminationMonoWeb.woff') format('woff'); }
        :root { --soul: #ff0000; --bg: #000; --gold: #ffd700; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; font-family: 'Pixel', sans-serif; overflow: hidden; }
        
        /* SEÇİM EKRANI */
        #game-container { display: flex; height: 100vh; flex-direction: column; }
        #select-screen { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; background: #050505; 
        }

        .char-card { 
            border: 2px solid #333; border-radius: 4px; overflow: hidden; 
            cursor: pointer; transition: 0.2s; background: #111; 
        }
        .char-card:hover { border-color: var(--soul); transform: scale(1.05); }
        .char-card .img-container { width: 100%; height: 100px; background: #000; display: flex; align-items: center; justify-content: center; }
        .char-card img { max-width: 90%; max-height: 90%; image-rendering: pixelated; }
        .char-name { padding: 5px; text-align: center; font-size: 0.7rem; background: #222; }

        /* CHAT EKRANI VE ARKA PLAN */
        #play-screen { display: none; flex: 1; flex-direction: column; position: relative; background-size: cover; background-position: center; transition: 0.5s; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 1; }
        
        #chat-window { position: relative; z-index: 2; flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border: 2px solid #fff; position: relative; animation: fadeIn 0.2s; background: rgba(0,0,0,0.8); }
        .bot { align-self: flex-start; border-left: 4px solid var(--gold); }
        .user { align-self: flex-end; border-right: 4px solid var(--soul); }

        .control-panel { position: relative; z-index: 2; padding: 15px; background: #000; border-top: 2px solid #fff; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #fff; color: white; padding: 12px; font-family: 'Pixel'; outline: none; }
        .btn { border: 2px solid #fff; background: #000; color: #fff; font-family: 'Pixel'; cursor: pointer; padding: 5px 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar" style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--soul); font-size: 1.2rem;">❤</span>
        <button class="btn" onclick="location.reload()" style="font-size:0.6rem;">MENÜYE DÖN</button>
    </div>
    
    <div id="select-screen"></div>

    <div id="play-screen">
        <div id="overlay"></div>
        <div id="chat-window"></div>
        <div class="control-panel">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Bir şey söyle..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">GÖNDER</button>
            </div>
        </div>
    </div>
</div>

<script>
// MEKAN FOTOĞRAFLARI VE KARAKTERLER
const locations = {
    dark: "https://images.squarespace-cdn.com/content/v1/55ef393be4b0162090432064/1539281789728-E63U25T8N7Y06B5T33P2/castle_town.png",
    snowdin: "https://i.pinimg.com/originals/34/06/17/34061737e40b36873919e8759600a747.gif",
    ruins: "https://i.pinimg.com/originals/70/43/72/7043729e92753a813c9e900995167f63.gif",
    lab: "https://vignette.wikia.nocookie.net/undertale/images/d/d4/Lab.png/revision/latest?cb=20151121213009",
    castle: "https://i.pinimg.com/originals/16/9c/68/169c6806540307399f9df395d8883654.gif"
};

const charData = [
    { n: "Kris", i: "https://www.spriters-resource.com/resources/sheets/110/112930.png", bg: locations.dark, s: "..." },
    { n: "Ralsei", i: "https://utdr.wiki/images/thumb/e/e0/Ralsei_Talking_Sprite.gif/120px-Ralsei_Talking_Sprite.gif", bg: locations.dark, s: "Seni burada görmek ne güzel!" },
    { n: "Susie", i: "https://utdr.wiki/images/thumb/e/eb/Susie_Talking_Sprite.gif/120px-Susie_Talking_Sprite.gif", bg: locations.dark, s: "Yine mi sen?" },
    { n: "Noelle", i: "https://utdr.wiki/images/thumb/d/d7/Noelle_Holiday_Talking_Sprite.gif/120px-Noelle_Holiday_Talking_Sprite.gif", bg: locations.dark, s: "Merhaba..." },
    { n: "Toriel", i: "https://utdr.wiki/images/thumb/7/7e/Toriel_Talking_Sprite.gif/120px-Toriel_Talking_Sprite.gif", bg: locations.ruins, s: "Hoş geldin evladım." },
    { n: "Sans", i: "https://utdr.wiki/images/thumb/0/01/Sans_Talking_Sprite.gif/120px-Sans_Talking_Sprite.gif", bg: locations.snowdin, s: "selam dostum." },
    { n: "Papyrus", i: "https://utdr.wiki/images/thumb/c/ca/Papyrus_Talking_Sprite.gif/120px-Papyrus_Talking_Sprite.gif", bg: locations.snowdin, s: "NYEH HEH HEH!" },
    { n: "Alphys", i: "https://utdr.wiki/images/thumb/6/69/Alphys_Talking_Sprite.gif/120px-Alphys_Talking_Sprite.gif", bg: locations.lab, s: "Ş-şey, merhaba!" },
    { n: "Undyne", i: "https://utdr.wiki/images/thumb/0/08/Undyne_Talking_Sprite.gif/120px-Undyne_Talking_Sprite.gif", bg: locations.lab, s: "NGAAAAHHH!" },
    { n: "Spamton", i: "https://utdr.wiki/images/thumb/1/1c/Spamton_Talking_Sprite.gif/120px-Spamton_Talking_Sprite.gif", bg: locations.dark, s: "[Büyük Olmak] İster Misin?" },
    { n: "Asgore", i: "https://utdr.wiki/images/thumb/a/a2/Asgore_Talking_Sprite.gif/120px-Asgore_Talking_Sprite.gif", bg: locations.castle, s: "Biraz çay?" },
    { n: "Chara", i: "https://utdr.wiki/images/thumb/4/4e/Chara_Talking_Sprite.gif/120px-Chara_Talking_Sprite.gif", bg: locations.ruins, s: "Selam." },
    { n: "Frisk", i: "https://utdr.wiki/images/thumb/d/d3/Frisk_Talking_Sprite.gif/120px-Frisk_Talking_Sprite.gif", bg: locations.ruins, s: "-_-" },
    { n: "Queen", i: "https://utdr.wiki/images/thumb/5/5f/Queen_Talking_Sprite.gif/120px-Queen_Talking_Sprite.gif", bg: locations.dark, s: "Merhaba Potasyum." },
    { n: "Lancer", i: "https://utdr.wiki/images/thumb/1/15/Lancer_Talking_Sprite.gif/120px-Lancer_Talking_Sprite.gif", bg: locations.dark, s: "Ho-ho!" },
    { n: "Flowey", i: "https://utdr.wiki/images/thumb/8/83/Flowey_Talking_Sprite.gif/120px-Flowey_Talking_Sprite.gif", bg: locations.ruins, s: "Seni aptal!" },
    { n: "Mettaton", i: "https://utdr.wiki/images/thumb/d/db/Mettaton_EX_Talking_Sprite.gif/120px-Mettaton_EX_Talking_Sprite.gif", bg: locations.lab, s: "Daaaaarling!" },
    { n: "Rouxls Kaard", i: "https://utdr.wiki/images/thumb/7/7b/Rouxls_Kaard_Talking_Sprite.gif/120px-Rouxls_Kaard_Talking_Sprite.gif", bg: locations.dark, s: "Eğil-eth!" },
    { n: "Berdly", i: "https://utdr.wiki/images/thumb/2/2f/Berdly_Talking_Sprite.gif/120px-Berdly_Talking_Sprite.gif", bg: locations.dark, s: "Sana ders vereceğim!" },
    { n: "Asriel", i: "https://utdr.wiki/images/thumb/6/63/Asriel_Dreemurr_Talking_Sprite.gif/120px-Asriel_Dreemurr_Talking_Sprite.gif", bg: locations.castle, s: "Seni özledim." }
];

let selectedChar = null;

function renderChars() {
    const screen = document.getElementById('select-screen');
    charData.forEach((c, idx) => {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.onclick = () => selectChar(idx);
        card.innerHTML = `<div class="img-container"><img src="${c.i}"></div><div class="char-name">${c.n}</div>`;
        screen.appendChild(card);
    });
}
renderChars();

function selectChar(idx) {
    selectedChar = charData[idx];
    const playScreen = document.getElementById('play-screen');
    playScreen.style.backgroundImage = `url('${selectedChar.bg}')`;
    document.getElementById('select-screen').style.display = 'none';
    playScreen.style.display = 'flex';
    addMsg(`* ${selectedChar.n} yaklaşıyor...`, 'bot');
    addMsg(selectedChar.s, 'bot');
}

function addMsg(txt, type) {
    const win = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerText = txt;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim().toLowerCase();
    if(!msg) return;

    addMsg(input.value, 'user');
    input.value = "";

    setTimeout(() => {
        let reply = "";
        const n = selectedChar.n;
        if(msg.includes("merhaba")) reply = (n === "Sans") ? "selam evlat." : "Merhaba!";
        else if(msg.includes("nasılsın")) reply = "İyiyim, ya sen?";
        else reply = "* (Karakter sana sessizce gülümsüyor.)";
        addMsg(reply, 'bot');
    }, 800);
}
</script>
</body>
</html>
